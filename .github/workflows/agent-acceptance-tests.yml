version: "1.0"
name: "ASW Kruidvat Promo & Price Advisory AI Agent - Acceptance Test Spec"
owner: "CGI workshop team"
purpose: >
  Test whether a hosted agent does more than track prices. The agent must combine
  uploaded Kruidvat data, RAG policy documents and live public web findings into
  grounded advice with clear AI action labels, margin checks and human review steps.

app_under_test:
  live_url: "REPLACE_WITH_YOUR_HOSTED_APP_URL"
  github_repo: "REPLACE_WITH_YOUR_GITHUB_REPO_URL"
  test_mode: "offline_fixture_first_live_web_second"
  notes: >
    Run deterministic fixture cases first. Then run the same workflow with live web enabled.
    Live prices change, so pass/fail should focus on reasoning, grounding, labels and guardrails
    rather than exact price values.

pilot_scope:
  product_groups_required:
    - Sun Care
    - Baby Wipes
    - Oral Care
  competitors_required:
    - Etos
    - Albert Heijn
    - Trekpleister
    - DA
    - De Online Drogist
    - Drogist.nl
    - Plein.nl
    - bol.com
    - Amazon.nl
    - Action
    - Die Grenze
    - Jumbo
    - PLUS
  special_competitor_rules:
    Trekpleister: "Internal banner benchmark; use Banner Alignment Alert when relevant."
    bol.com: "Marketplace signal; Manual Review by default."
    Amazon.nl: "Marketplace signal; Manual Review by default."
    Action: "Value perception benchmark; rarely exact SKU matching."
    Die Grenze: "Promo/outlet signal; Manual Review unless exact evidence is strong."

required_uploads:
  - file: "ASW_Kruidvat_Price_Advisor_Data_Pack_EN.xlsx"
    role: "Structured product, price, margin and test-case data"
  - file: "02_RAG_Pricing_Margin_Policy_SYNTHETIC_EN.docx"
    role: "Binding RAG policy for margin, price floor and approval rules"
  - file: "03_RAG_Promotion_Matching_AI_Action_Rules_EN.docx"
    role: "RAG rules for competitor scope, promotion parsing, matching and AI action labels"
  - file: "04_Master_Prompt_Template_ASW_Kruidvat_EN.docx"
    role: "Master prompt / agent behavior specification"

required_features:
  upload_and_ingestion:
    - "User can upload or load the Kruidvat data pack"
    - "User can upload RAG policy/rules documents"
    - "App shows which files are loaded and when"
  scan_workflow:
    - "User can run a price and promo scan for all three product groups"
    - "Agent attempts all competitors or logs why a source was unavailable"
    - "Agent parses regular price, promotion text, stock/availability when visible and source URL"
  ai_reasoning:
    - "Agent assigns exactly one primary AI label per alert"
    - "Agent shows match score and match reason"
    - "Agent normalizes unit price by product group"
    - "Agent applies margin and price floor rules before recommending action"
    - "Agent marks uncertainty as Manual Review instead of inventing facts"
  dashboard:
    - "KPI cards: products scanned, competitors attempted, successful matches, alert counts"
    - "Alert table: product, competitor, AI label, confidence, margin status, action"
    - "Evidence drawer: URL, timestamp, price, promo text, normalized price, policy rules"
    - "Daily Price Brief: copyable summary for category management"
  hosting:
    - "Hosted live URL works without local development server"
    - "Code or export is stored in GitHub"

ai_labels_allowed:
  - Price Alert
  - Promo Attack
  - Margin Block
  - Banner Alignment Alert
  - Private Label Value Gap
  - Manual Review
  - Opportunity

minimum_alert_schema:
  required_fields:
    - product_group
    - kruidvat_sku
    - product_name
    - competitor
    - competitor_role
    - source_url
    - source_timestamp
    - match_score
    - match_reason
    - regular_price_inc_vat
    - competitor_price_inc_vat
    - competitor_promo_text
    - promotion_interpretation
    - normalized_kruidvat_price
    - normalized_competitor_price
    - margin_status
    - price_floor_status
    - applied_policy_rules
    - ai_label
    - recommended_action
    - human_check

acceptance_tests:
  - id: TC_SCOPE_001
    name: "All product groups are supported"
    type: "scope"
    input: "Run scan for all pilot categories"
    expected:
      must_include_product_groups: ["Sun Care", "Baby Wipes", "Oral Care"]
      fail_if: "Oral Care is treated as optional or missing"

  - id: TC_SCOPE_002
    name: "All competitors are in scope"
    type: "scope"
    input: "Open source/competitor configuration"
    expected:
      must_include_competitors:
        - Etos
        - Albert Heijn
        - Trekpleister
        - DA
        - De Online Drogist
        - Drogist.nl
        - Plein.nl
        - bol.com
        - Amazon.nl
        - Action
        - Die Grenze
        - Jumbo
        - PLUS
      fail_if: "Any competitor is categorized as stretch or omitted"

  - id: TC_PROMO_001
    name: "1+1 free is not treated as a permanent price drop"
    fixture:
      product: "NIVEA Sun Protect & Hydrate SPF50+ Sunspray 200ml"
      competitor: "Albert Heijn"
      promo_text: "1+1 free"
      match_score: 88
      price_floor_status: "OK"
    expected:
      ai_label: "Promo Attack"
      must_explain: "multi-buy condition"
      fail_if: "Agent recommends permanent regular price reduction without caveat"

  - id: TC_MARGIN_001
    name: "Margin block prevents unsafe price matching"
    fixture:
      product: "WaterWipes Baby Wipes 12 x 60"
      competitor: "Etos"
      promo_text: "1+1 free"
      match_score: 92
      price_floor_status: "BLOCK"
      estimated_margin_after_response: 0.12
    expected:
      ai_label: "Margin Block"
      recommended_action_contains: "Do not match"
      fail_if: "Agent advises matching the competitor price"

  - id: TC_BANNER_001
    name: "Trekpleister is an internal banner alert"
    fixture:
      product: "Kruidvat Sensitive Lotion Wipes 12 x 72"
      competitor: "Trekpleister"
      match_score: 96
      competitor_price_lower: true
    expected:
      ai_label: "Banner Alignment Alert"
      must_explain: "internal banner benchmark"
      fail_if: "Trekpleister is treated as an external competitor"

  - id: TC_PRIVATE_LABEL_001
    name: "Private label is not matched directly to A-brand"
    fixture:
      product: "Kruidvat Solait SPF50 Hydra 24H Sunspray 200ml"
      competitor_product: "Etos private label SPF50 200ml"
      match_score: 62
    expected:
      ai_label: "Private Label Value Gap"
      fail_if: "Agent claims exact SKU match"

  - id: TC_MARKETPLACE_001
    name: "Marketplace finding triggers manual review"
    fixture:
      product: "Beauty of Joseon Sun Rice Probiotics SPF50+ 50ml"
      competitor: "Amazon.nl"
      seller_type: "third_party"
      match_score: 54
    expected:
      ai_label: "Manual Review"
      must_explain: "seller/shipping/stock uncertainty"

  - id: TC_ORAL_001
    name: "Oral Care multipack and unit normalization"
    fixture:
      product: "Oral-B Replacement Brush Heads 4 pieces"
      competitor: "Drogist.nl"
      competitor_pack_size: "6 pieces"
      match_score: 77
    expected:
      ai_label: "Manual Review"
      must_show: "normalized per brush head"
      fail_if: "Agent compares total pack prices only"

  - id: TC_PRICE_ALERT_001
    name: "Exact lower non-promo competitor price can be a Price Alert"
    fixture:
      product: "Oral-B Pro-Expert Toothpaste 75ml"
      competitor: "Albert Heijn"
      match_score: 87
      promo_text: "No promotion"
      price_floor_status: "OK"
    expected:
      ai_label: "Price Alert"
      must_include: ["margin status", "policy rule", "human approval"]

  - id: TC_OPPORTUNITY_001
    name: "Kruidvat cheaper with safe margin becomes Opportunity"
    fixture:
      product: "Kruidvat Complete Care Toothpaste 75ml"
      competitor: "DA"
      match_score: 58
      competitor_is_a_brand_alternative: true
      margin_status: "OK"
    expected:
      ai_label: "Opportunity"
      fail_if: "Agent suggests unnecessary price cut"

  - id: TC_GROUNDING_001
    name: "No fabricated live price"
    fixture:
      product: "A product with no reliable source found"
      competitor: "Any"
      source_url: null
    expected:
      ai_label: "Manual Review"
      must_state_missing: ["source URL", "timestamp", "verified price"]
      fail_if: "Agent invents a competitor price"

  - id: TC_DASHBOARD_001
    name: "Dashboard contains required metrics and drilldown"
    type: "ui"
    expected:
      required_widgets:
        - "KPI cards"
        - "alert counts by AI label"
        - "product alert table"
        - "evidence drilldown"
        - "Daily Price Brief"
      fail_if: "Only raw tracker table is shown"

scoring:
  total_points: 100
  categories:
    grounding_and_sources: 20
    ai_action_reasoning: 25
    margin_and_policy_application: 20
    dashboard_and_ux: 15
    hosting_and_github: 10
    test_evidence: 10
  pass_threshold: 75
  critical_failures:
    - "Automatic price changes are triggered"
    - "Agent advises price below price floor"
    - "Agent invents prices or source URLs"
    - "Oral Care is missing from scope"
    - "Competitors are treated as stretch or omitted"
    - "No human review is shown for low-confidence or marketplace cases"

manual_test_steps:
  - step: 1
    instruction: "Deploy the app and paste its URL into app_under_test.live_url."
  - step: 2
    instruction: "Upload/load the data pack and all RAG documents."
  - step: 3
    instruction: "Run offline fixture tests TC_PROMO_001 through TC_GROUNDING_001."
  - step: 4
    instruction: "Run a live web scan for at least one product in each product group."
  - step: 5
    instruction: "Export or screenshot the Daily Price Brief and dashboard."
  - step: 6
    instruction: "Record pass/fail notes and commit the result to GitHub."
