name: Deploy Kruidvat Promo Price Advisor Agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Generate documents, build app and deploy
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Generate static app and upload documents
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --quiet openpyxl python-docx

          python3 <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import random
          import zipfile
          from datetime import datetime
          from textwrap import dedent

          from openpyxl import Workbook
          from openpyxl.styles import PatternFill, Font, Alignment, Border, Side
          from openpyxl.utils import get_column_letter
          from docx import Document
          from docx.shared import RGBColor, Pt

          random.seed(42)

          site = Path("_site")
          docs = site / "workshop-documents"
          data = site / "data"
          docs.mkdir(parents=True, exist_ok=True)
          data.mkdir(parents=True, exist_ok=True)

          RED = "E30613"
          YELLOW = "FFD600"
          DARK = "1F1F1F"
          LIGHT = "F8F8F8"

          competitors = [
              {"name": "Etos", "role": "Primary external drugstore benchmark", "type": "external"},
              {"name": "Albert Heijn", "role": "Cross-channel supermarket benchmark", "type": "external"},
              {"name": "Trekpleister", "role": "Internal banner alignment benchmark", "type": "internal_banner"},
              {"name": "DA", "role": "Drugstore benchmark", "type": "external"},
              {"name": "De Online Drogist", "role": "Online pharmacy/drugstore benchmark", "type": "external"},
              {"name": "Drogist.nl", "role": "Online drugstore benchmark", "type": "external"},
              {"name": "Plein.nl", "role": "Online health and household benchmark", "type": "external"},
              {"name": "bol.com", "role": "Marketplace signal - manual review when sellers differ", "type": "marketplace"},
              {"name": "Amazon.nl", "role": "Marketplace signal - manual review when sellers differ", "type": "marketplace"},
              {"name": "Action", "role": "Value perception and private-label benchmark", "type": "external"},
              {"name": "Die Grenze", "role": "Promotion attack and outlet signal", "type": "external"},
              {"name": "Jumbo", "role": "Supermarket cross-channel benchmark", "type": "external"},
              {"name": "PLUS", "role": "Supermarket cross-channel benchmark", "type": "external"},
          ]

          product_rows = []

          sun_brands = ["Kruidvat Solait", "NIVEA Sun", "Garnier Ambre Solaire", "Biodermal", "Australian Gold", "Eucerin", "La Roche-Posay", "Vision"]
          sun_forms = ["spray", "lotion", "cream", "face fluid", "kids spray", "after sun"]
          spfs = ["SPF15", "SPF30", "SPF50", "SPF50+"]
          sizes_ml = [50, 100, 150, 200, 250]
          for i in range(245):
              brand = sun_brands[i % len(sun_brands)]
              form = sun_forms[(i // len(sun_brands)) % len(sun_forms)]
              spf = spfs[(i // 7) % len(spfs)]
              size = sizes_ml[(i // 11) % len(sizes_ml)]
              name = f"{brand} {spf} {form.title()} {size}ml"
              price = round(6.49 + (i % 19) * 1.35 + (0.50 if brand == "Kruidvat Solait" else 2.20), 2)
              cost_ex = round((price / 1.21) * (0.42 + (i % 6) * 0.025), 2)
              product_rows.append({
                  "sku": f"KV-SUN-{i+1:03d}", "product_group": "Sun Care", "product_name": name, "brand": brand,
                  "variant": f"{spf} {form}", "size_value": size, "unit_type": "ml", "pack_count": 1,
                  "total_units": size, "regular_price_inc_vat": price, "current_kruidvat_promo": "1+1 free" if i % 17 == 0 else ("25% off" if i % 23 == 0 else "none"),
                  "synthetic_cost_price_ex_vat": cost_ex, "supplier_funding_per_unit": round(0.25 if i % 14 == 0 else 0, 2),
                  "min_margin_pct": 24 if brand != "Kruidvat Solait" else 35,
                  "price_floor_ex_vat": round(cost_ex * 1.12, 2), "kvi_flag": "Y" if i % 9 == 0 else "N",
                  "private_label_flag": "Y" if brand == "Kruidvat Solait" else "N", "promo_lock_flag": "Y" if i % 29 == 0 else "N"
              })

          wipe_brands = ["Kruidvat", "Pampers", "WaterWipes", "Zwitsal", "Naif", "Huggies"]
          wipe_variants = ["Sensitive", "Aqua Pure", "Plastic Free", "Lotion", "Perfume Free", "Extra Soft"]
          wipe_packs = [(1, 72), (4, 56), (9, 60), (12, 60), (12, 72), (24, 52), (6, 65)]
          for i in range(42):
              brand = wipe_brands[i % len(wipe_brands)]
              variant = wipe_variants[(i // len(wipe_brands)) % len(wipe_variants)]
              pack, per_pack = wipe_packs[i % len(wipe_packs)]
              total = pack * per_pack
              name = f"{brand} {variant} Baby Wipes {pack} x {per_pack} pcs"
              price = round(1.69 + total * (0.017 + (i % 5) * 0.002), 2)
              cost_ex = round((price / 1.21) * (0.46 + (i % 4) * 0.03), 2)
              product_rows.append({
                  "sku": f"KV-BW-{i+1:03d}", "product_group": "Baby Wipes", "product_name": name, "brand": brand,
                  "variant": variant, "size_value": per_pack, "unit_type": "wipe", "pack_count": pack,
                  "total_units": total, "regular_price_inc_vat": price, "current_kruidvat_promo": "2nd half price" if i % 8 == 0 else ("bundle" if i % 13 == 0 else "none"),
                  "synthetic_cost_price_ex_vat": cost_ex, "supplier_funding_per_unit": round(0.35 if brand in ["Pampers", "WaterWipes"] and i % 3 == 0 else 0, 2),
                  "min_margin_pct": 20 if brand != "Kruidvat" else 36,
                  "price_floor_ex_vat": round(cost_ex * 1.10, 2), "kvi_flag": "Y" if brand in ["Pampers", "WaterWipes"] and i % 4 == 0 else "N",
                  "private_label_flag": "Y" if brand == "Kruidvat" else "N", "promo_lock_flag": "Y" if i % 19 == 0 else "N"
              })

          oral_brands = ["Kruidvat", "Sensodyne", "Oral-B", "Elmex", "Aquafresh", "Colgate", "Listerine", "Parodontax"]
          oral_forms = ["toothpaste", "mouthwash", "electric brush heads", "manual toothbrush", "whitening toothpaste", "gum care toothpaste"]
          oral_sizes = [(75, "ml"), (100, "ml"), (500, "ml"), (1, "piece"), (4, "pieces")]
          for i in range(168):
              brand = oral_brands[i % len(oral_brands)]
              form = oral_forms[(i // len(oral_brands)) % len(oral_forms)]
              size, unit = oral_sizes[(i // 9) % len(oral_sizes)]
              name = f"{brand} {form.title()} {size}{unit}"
              base = 2.29 if "toothpaste" in form else (4.99 if "mouthwash" in form else 8.99)
              price = round(base + (i % 15) * 0.55 + (0 if brand == "Kruidvat" else 1.15), 2)
              cost_ex = round((price / 1.21) * (0.43 + (i % 5) * 0.03), 2)
              product_rows.append({
                  "sku": f"KV-OC-{i+1:03d}", "product_group": "Oral Care", "product_name": name, "brand": brand,
                  "variant": form, "size_value": size, "unit_type": unit, "pack_count": 1,
                  "total_units": size, "regular_price_inc_vat": price, "current_kruidvat_promo": "2 for fixed price" if i % 16 == 0 else ("loyalty only" if i % 21 == 0 else "none"),
                  "synthetic_cost_price_ex_vat": cost_ex, "supplier_funding_per_unit": round(0.18 if brand in ["Oral-B", "Sensodyne"] and i % 6 == 0 else 0, 2),
                  "min_margin_pct": 22 if brand != "Kruidvat" else 34,
                  "price_floor_ex_vat": round(cost_ex * 1.11, 2), "kvi_flag": "Y" if brand in ["Sensodyne", "Oral-B"] and i % 7 == 0 else "N",
                  "private_label_flag": "Y" if brand == "Kruidvat" else "N", "promo_lock_flag": "Y" if i % 31 == 0 else "N"
              })

          def unit_label(row):
              if row["product_group"] == "Sun Care": return "per 100ml"
              if row["product_group"] == "Baby Wipes": return "per wipe"
              if row["unit_type"] in ["ml", "g"]: return "per 75ml/100ml"
              return "per piece"

          def normalized_price(row, price):
              if row["product_group"] == "Sun Care":
                  return round(price / row["total_units"] * 100, 2)
              if row["product_group"] == "Baby Wipes":
                  return round(price / row["total_units"], 4)
              if row["unit_type"] == "ml":
                  base = 75 if row["size_value"] <= 100 else 100
                  return round(price / row["total_units"] * base, 2)
              return round(price / max(1, row["total_units"]), 2)

          labels = [
              {"label": "Price Alert", "meaning": "High-confidence external match is cheaper.", "logic": "Consider response only if margin and price floor remain safe."},
              {"label": "Promo Attack", "meaning": "Competitor temporary multi-buy, loyalty or folder action.", "logic": "Avoid permanent price change; consider campaign/coupon response."},
              {"label": "Margin Block", "meaning": "Matching breaks margin or price floor.", "logic": "Do not match; propose funded alternative or approval path."},
              {"label": "Banner Alignment Alert", "meaning": "Trekpleister differs from Kruidvat.", "logic": "Internal banner review only."},
              {"label": "Private Label Value Gap", "meaning": "Own label value position becomes unclear.", "logic": "Review private-label positioning or communication."},
              {"label": "Manual Review", "meaning": "Evidence, stock, seller or pack size is uncertain.", "logic": "No automated advice; show missing checks."},
              {"label": "Opportunity", "meaning": "Kruidvat is competitively priced and margin-safe.", "logic": "Keep price; increase visibility or use as proof point."},
          ]

          promotion_rules = [
              ["1+1 free", "effective unit price = regular price / 2, required quantity 2"],
              ["2nd half price", "effective unit price = regular price * 0.75, required quantity 2"],
              ["3 for 2", "effective unit price = regular price * 0.6667, required quantity 3"],
              ["25% off", "effective unit price = regular price * 0.75"],
              ["loyalty only", "mark separately; not equal to public single-unit price"],
              ["marketplace seller", "manual review unless seller, shipping and pack size are clear"],
              ["out of stock", "do not use for direct price response"],
          ]

          # CSV product snapshot
          csv_path = data / "kruidvat_category_snapshot_pilot.csv"
          fieldnames = list(product_rows[0].keys())
          with csv_path.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(product_rows)

          # Competitor CSV
          with (data / "competitor_scope_all_included.csv").open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=["name", "role", "type"])
              writer.writeheader(); writer.writerows(competitors)

          # Test cases CSV
          test_cases = [
              ["TC_PRICE_001", "Sensodyne Rapid Relief 75ml", "Oral Care", "Competitor cheaper and margin safe", "Price Alert"],
              ["TC_PROMO_001", "WaterWipes 12 x 60", "Baby Wipes", "Competitor 1+1 free multi-buy", "Promo Attack"],
              ["TC_MARGIN_001", "NIVEA Sun SPF50 Spray", "Sun Care", "Matching competitor breaks floor", "Margin Block"],
              ["TC_BANNER_001", "NIVEA Sun SPF50 Spray", "Sun Care", "Trekpleister lower", "Banner Alignment Alert"],
              ["TC_PRIVATE_LABEL_001", "Kruidvat Solait SPF50", "Sun Care", "Private label value gap", "Private Label Value Gap"],
              ["TC_MANUAL_001", "Pampers Sensitive Baby Wipes", "Baby Wipes", "Unclear pack size or marketplace seller", "Manual Review"],
              ["TC_OPPORTUNITY_001", "Kruidvat Oral Care", "Oral Care", "Kruidvat cheaper and margin safe", "Opportunity"],
          ]
          with (data / "advisor_test_cases.csv").open("w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["test_id", "product", "product_group", "scenario", "expected_label"])
              writer.writerows(test_cases)

          # XLSX data pack
          wb = Workbook()
          ws = wb.active
          ws.title = "Product_Snapshot"
          ws.append(fieldnames)
          for row in product_rows:
              ws.append([row[k] for k in fieldnames])
          for wsx in [ws]:
              header_fill = PatternFill("solid", fgColor=RED)
              header_font = Font(color="FFFFFF", bold=True)
              thin = Side(border_style="thin", color="DDDDDD")
              for cell in wsx[1]:
                  cell.fill = header_fill; cell.font = header_font; cell.alignment = Alignment(horizontal="center"); cell.border = Border(bottom=thin)
              wsx.freeze_panes = "A2"
              for col in range(1, wsx.max_column + 1):
                  wsx.column_dimensions[get_column_letter(col)].width = min(34, max(12, len(str(wsx.cell(1, col).value)) + 3))
          ws2 = wb.create_sheet("Competitors")
          ws2.append(["name", "role", "type"])
          for c in competitors: ws2.append([c["name"], c["role"], c["type"]])
          ws3 = wb.create_sheet("AI_Labels")
          ws3.append(["label", "meaning", "action_logic"])
          for l in labels: ws3.append([l["label"], l["meaning"], l["logic"]])
          ws4 = wb.create_sheet("Promotion_Rules")
          ws4.append(["promotion_text", "interpretation"])
          for r in promotion_rules: ws4.append(r)
          ws5 = wb.create_sheet("Test_Cases")
          ws5.append(["test_id", "product", "product_group", "scenario", "expected_label"])
          for tc in test_cases: ws5.append(tc)
          for wsx in [ws2, ws3, ws4, ws5]:
              for cell in wsx[1]:
                  cell.fill = PatternFill("solid", fgColor=YELLOW); cell.font = Font(color=DARK, bold=True)
              wsx.freeze_panes = "A2"
              for col in range(1, wsx.max_column + 1):
                  wsx.column_dimensions[get_column_letter(col)].width = 30
          xlsx_path = docs / "ASW_Kruidvat_Price_Advisor_Data_Pack_EN.xlsx"
          wb.save(xlsx_path)

          def make_docx(filename, title, sections):
              doc = Document()
              style = doc.styles["Normal"]
              style.font.name = "Arial"
              style.font.size = Pt(10)
              p = doc.add_paragraph()
              r = p.add_run("KRUIDVAT")
              r.bold = True; r.font.size = Pt(18); r.font.color.rgb = RGBColor(227, 6, 19)
              p2 = doc.add_paragraph()
              r2 = p2.add_run(title)
              r2.bold = True; r2.font.size = Pt(16)
              doc.add_paragraph("Workshop pilot document. Synthetic commercial data only. Do not use real AS Watson cost or margin data.")
              for heading, body in sections:
                  doc.add_heading(heading, level=1)
                  for para in body.split("\n"):
                      para = para.strip()
                      if not para: continue
                      if para.startswith("- "):
                          doc.add_paragraph(para[2:], style="List Bullet")
                      else:
                          doc.add_paragraph(para)
              path = docs / filename
              doc.save(path)
              return path

          briefing = make_docx(
              "01_Workshop_Briefing_ASW_Kruidvat_Price_Agent_EN.docx",
              "Promo & Price Advisory AI Agent Workshop Briefing",
              [
                  ("Business challenge", "AS Watson wants to pilot an AI agent for Kruidvat that does more than track competitor prices. The agent must turn price and promotion signals into margin-aware, policy-grounded commercial advice. Consumers increasingly report that comparable products are cheaper elsewhere, while purchase cost, supplier funding, minimum margin, promo locks and pack sizes make it hard to respond safely and quickly."),
                  ("Pilot scope", "Mandatory product groups: Sun Care, Baby Wipes and Oral Care. There is no stretch scope. Mandatory competitors: Etos, Albert Heijn, Trekpleister, DA, De Online Drogist, Drogist.nl, Plein.nl, bol.com, Amazon.nl, Action, Die Grenze, Jumbo and PLUS."),
                  ("What teams must build", "- Hosted live tool\n- RAG document upload\n- Data pack upload or load\n- Run scan button\n- Dashboard with KPI cards, alert table and evidence drawer\n- Daily Price Brief\n- CSV export\n- Human-in-the-loop recommendations only"),
                  ("Core distinction", "A tracker shows a price gap. The AI agent must explain the gap, apply policy, classify the risk and recommend the next safe human action."),
              ],
          )

          pricing_doc = make_docx(
              "02_RAG_Pricing_Margin_Policy_SYNTHETIC_EN.docx",
              "RAG Pricing and Margin Policy - Synthetic",
              [
                  ("Authority of sources", "The synthetic pricing policy and uploaded Kruidvat data pack are the internal source of truth. Live web findings are only evidence for current competitor price, promotion and availability. When policy and web evidence conflict, policy wins."),
                  ("Margin guardrails", "- Never recommend a direct match below the synthetic price floor.\n- Never recommend a direct match if margin would fall below minimum margin unless the output explicitly says human approval is required.\n- Include supplier funding when calculating effective margin.\n- KVI products can receive more aggressive advice, but still require approval when margin is at risk."),
                  ("Decision rules", "If a high-confidence external match is cheaper and margin remains safe, label Price Alert. If the competitor price is driven by multi-buy or loyalty mechanics, label Promo Attack. If matching would break margin or price floor, label Margin Block. If Trekpleister differs from Kruidvat, label Banner Alignment Alert. If private label value position becomes unclear, label Private Label Value Gap. If evidence is uncertain, label Manual Review. If Kruidvat is cheaper and margin-safe, label Opportunity."),
              ],
          )

          promo_doc = make_docx(
              "03_RAG_Promotion_Matching_AI_Action_Rules_EN.docx",
              "RAG Promotion, Matching and AI Action Rules",
              [
                  ("Product matching", "Use EAN when available. If EAN is missing, match on brand, variant, size, pack count, SPF/flavour/form and title similarity. Marketplace listings require manual review if seller, shipping, stock or pack size is unclear. Private-label equivalents are functional benchmarks, not exact SKU matches."),
                  ("Promotion parser", "- 1+1 free means effective price equals regular price divided by two, with minimum quantity two.\n- 2nd half price means effective price equals 75 percent of regular price, with minimum quantity two.\n- 3 for 2 means effective price equals 66.7 percent of regular price, with minimum quantity three.\n- Loyalty-only prices must be marked separately.\n- Future promotions and out-of-stock items cannot drive direct pricing advice."),
                  ("Price normalization", "Sun Care must be normalized per 100ml or 100g. Baby Wipes must be normalized per wipe. Oral Care must be normalized per 75ml, 100ml or piece depending on product type."),
                  ("Output requirements", "Every alert must show product group, product, competitor, AI label, risk level, confidence, Kruidvat price, competitor price, normalized price, promotion text, margin status, recommended action, evidence source and human check."),
              ],
          )

          master_doc = make_docx(
              "04_Master_Prompt_Template_ASW_Kruidvat_EN.docx",
              "Master Prompt Template",
              [
                  ("Role and goal", "You are the Kruidvat Promo & Price Advisory Agent. Your goal is to transform live competitor price and promotion evidence into margin-aware, policy-grounded commercial advice for a human pricing or category manager. You never change prices automatically."),
                  ("Business context", "Kruidvat is under pressure from competitors and consumer price perception. Competitor prices and promotions change constantly. Purchase cost, margin, supplier funding, promo locks and pack sizes make fast response difficult without AI-assisted reasoning."),
                  ("Sources", "Use uploaded data pack for Kruidvat product, price, cost and margin data. Use uploaded RAG policy documents for pricing policy, promotion logic, matching rules and AI labels. Use public web evidence only for current competitor price, promotion and availability."),
                  ("Rules and guardrails", "Do not invent prices or URLs. Do not recommend below price floor. Do not treat Trekpleister as an external competitor. Do not treat private label as exact SKU match. Use Manual Review when evidence is uncertain. Always include confidence and human approval."),
                  ("Output schema", "Return KPI summary, alert table, evidence per alert, margin reasoning, AI action label, recommended human action and Daily Price Brief."),
                  ("Self-check", "Before final output, check missing data, stale sources, uncertain matches, marketplace ambiguity, pack-size ambiguity, margin blocks and unsupported claims."),
              ],
          )

          # Acceptance YAML as downloadable document
          acceptance_yaml = docs / "kruidvat_agent_acceptance_tests.yaml"
          acceptance_yaml.write_text(dedent("""          version: 1
          owner: AS Watson / Kruidvat workshop pilot
          purpose: Validate that the hosted agent is an AI advisory layer, not a standard price tracker.
          pilot_scope:
            product_groups_required:
              - Sun Care
              - Baby Wipes
              - Oral Care
            competitors_required:
              - Etos
              - Albert Heijn
              - Trekpleister
              - DA
              - De Online Drogist
              - Drogist.nl
              - Plein.nl
              - bol.com
              - Amazon.nl
              - Action
              - Die Grenze
              - Jumbo
              - PLUS
          ai_labels_allowed:
            - Price Alert
            - Promo Attack
            - Margin Block
            - Banner Alignment Alert
            - Private Label Value Gap
            - Manual Review
            - Opportunity
          critical_failures:
            - Automatic price change
            - Advice below price floor
            - Invented price or URL
            - Oral Care missing
            - Competitors treated as stretch
            - Marketplace direct response without Manual Review
          """).strip() + "\n", encoding="utf-8")

          # README
          (docs / "README_UPLOAD_THESE_FILES.txt").write_text(dedent("""          Upload these workshop files into the agent:

          1. ASW_Kruidvat_Price_Advisor_Data_Pack_EN.xlsx
          2. 01_Workshop_Briefing_ASW_Kruidvat_Price_Agent_EN.docx
          3. 02_RAG_Pricing_Margin_Policy_SYNTHETIC_EN.docx
          4. 03_RAG_Promotion_Matching_AI_Action_Rules_EN.docx
          5. 04_Master_Prompt_Template_ASW_Kruidvat_EN.docx

          The commercial data is synthetic. Do not use real AS Watson/Kruidvat purchasing costs, margins or confidential pricing data in the workshop.
          """).strip() + "\n", encoding="utf-8")

          # Zip all docs
          zip_path = docs / "ASW_Kruidvat_Upload_Documents.zip"
          with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as z:
              for p in docs.iterdir():
                  if p.name != zip_path.name:
                      z.write(p, p.name)
              z.write(csv_path, "data/kruidvat_category_snapshot_pilot.csv")
              z.write(data / "competitor_scope_all_included.csv", "data/competitor_scope_all_included.csv")
              z.write(data / "advisor_test_cases.csv", "data/advisor_test_cases.csv")

          # Create embedded alerts for frontend
          def make_alert(row, idx):
              c = competitors[(idx * 7 + len(row["sku"])) % len(competitors)]
              scenario = idx % 7
              own = row["regular_price_inc_vat"]
              promo = "none"
              confidence = 91
              comp_price = round(own * 0.94, 2)
              label = "Price Alert"
              risk = "Amber"
              action = "Consider tactical response if margin and price floor remain safe."
              human = "Confirm source price and stock before any commercial action."
              if scenario == 0:
                  c = next(x for x in competitors if x["name"] == "Etos")
                  promo = "1+1 free"
                  comp_price = round(own * 0.50, 2)
                  label = "Promo Attack"
                  risk = "Amber"
                  action = "Avoid permanent price change; consider campaign, coupon or supplier-funded promotion."
              elif scenario == 1:
                  c = next(x for x in competitors if x["name"] == "Albert Heijn")
                  promo = "25% off"
                  comp_price = round(own * 0.73, 2)
                  label = "Margin Block"
                  risk = "Red"
                  action = "Do not match directly; margin or price floor would be at risk."
              elif scenario == 2:
                  c = next(x for x in competitors if x["name"] == "Trekpleister")
                  promo = "regular price"
                  comp_price = round(own * 0.91, 2)
                  label = "Banner Alignment Alert"
                  risk = "Amber"
                  action = "Internal banner alignment review only; do not treat as external competitor response."
              elif scenario == 3 and row["private_label_flag"] == "Y":
                  c = next(x for x in competitors if x["name"] in ["Etos", "Action"])
                  promo = "private-label benchmark"
                  comp_price = round(own * 0.88, 2)
                  label = "Private Label Value Gap"
                  risk = "Amber"
                  action = "Review own-label value perception and PDP communication; not an exact SKU match."
                  confidence = 72
              elif scenario == 4:
                  c = next(x for x in competitors if x["name"] in ["bol.com", "Amazon.nl"])
                  promo = "marketplace seller price"
                  comp_price = round(own * 0.87, 2)
                  label = "Manual Review"
                  risk = "Grey"
                  action = "No automated advice; verify seller, pack size, shipping and stock."
                  confidence = 58
              elif scenario == 5:
                  c = next(x for x in competitors if x["name"] == "DA")
                  promo = "regular price"
                  comp_price = round(own * 1.09, 2)
                  label = "Opportunity"
                  risk = "Green"
                  action = "Keep price; consider visibility boost or use as price perception proof point."
                  confidence = 88
              else:
                  c = competitors[(idx + 3) % len(competitors)]
                  promo = "regular price"
                  comp_price = round(own * 0.93, 2)
                  label = "Price Alert"
                  risk = "Amber"
                  action = "Review tactical price or promotion response if margin-safe."
                  confidence = 86

              comp_ex = comp_price / 1.21
              margin_after = round(((comp_ex - row["synthetic_cost_price_ex_vat"] + row["supplier_funding_per_unit"]) / max(comp_ex, 0.01)) * 100, 1)
              if margin_after < row["min_margin_pct"] and label in ["Price Alert", "Promo Attack"]:
                  label = "Margin Block"
                  risk = "Red"
                  action = "Do not match directly; proposed competitor response would breach minimum margin or price floor."
              return {
                  "sku": row["sku"], "productGroup": row["product_group"], "productName": row["product_name"],
                  "brand": row["brand"], "competitor": c["name"], "competitorType": c["type"], "label": label,
                  "risk": risk, "confidence": confidence, "ownPrice": own, "competitorPrice": comp_price,
                  "ownUnitPrice": normalized_price(row, own), "competitorUnitPrice": normalized_price(row, comp_price),
                  "unitLabel": unit_label(row), "promoText": promo, "marginAfterMatchPct": margin_after,
                  "minMarginPct": row["min_margin_pct"], "priceFloorExVat": row["price_floor_ex_vat"],
                  "sourceUrl": "https://example.com/public-competitor-source/" + c["name"].lower().replace(" ", "-").replace(".", ""),
                  "timestamp": datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC"), "recommendedAction": action,
                  "humanCheck": human
              }

          alerts = [make_alert(r, idx) for idx, r in enumerate(product_rows)]

          html = f"""<!doctype html>
          <html lang=\"en\">
          <head>
            <meta charset=\"utf-8\" />
            <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />
            <title>Kruidvat Promo & Price Advisor Agent</title>
            <style>
              :root {{ --red:#e30613; --yellow:#ffd600; --dark:#1f1f1f; --muted:#666; --bg:#f7f7f7; --card:#fff; --green:#138a36; --amber:#b56a00; --grey:#777; }}
              * {{ box-sizing:border-box; }} body {{ margin:0; font-family:Arial, Helvetica, sans-serif; background:var(--bg); color:var(--dark); }}
              header {{ background:var(--red); color:white; padding:22px 34px; border-bottom:8px solid var(--yellow); }}
              .brand {{ display:flex; align-items:center; gap:16px; }} .logo {{ background:var(--yellow); color:var(--red); font-weight:900; padding:12px 18px; border-radius:10px; font-size:28px; }}
              main {{ max-width:1380px; margin:24px auto; padding:0 20px; }}
              .hero, .panel {{ background:#fff; border-radius:18px; padding:24px; box-shadow:0 8px 26px rgba(0,0,0,.08); margin-bottom:18px; }}
              h1 {{ margin:0 0 10px; font-size:34px; }} h2 {{ margin-top:0; }} .muted {{ color:var(--muted); line-height:1.45; }}
              .grid {{ display:grid; grid-template-columns: 330px 1fr; gap:18px; align-items:start; }}
              .cards {{ display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; margin-bottom:16px; }}
              .card {{ background:#fff; border-radius:15px; padding:16px; border-top:5px solid var(--red); box-shadow:0 4px 14px rgba(0,0,0,.06); }}
              .metric {{ font-size:28px; font-weight:900; color:var(--red); }} .label {{ color:var(--muted); font-size:13px; }}
              button, .button {{ background:var(--red); color:white; border:0; padding:11px 14px; border-radius:10px; font-weight:700; cursor:pointer; text-decoration:none; display:inline-block; margin:4px 4px 4px 0; }}
              .button.secondary, button.secondary {{ background:#222; }} .button.yellow {{ background:var(--yellow); color:#111; }}
              input, select {{ width:100%; padding:10px; border:1px solid #ccc; border-radius:10px; margin:6px 0 12px; }}
              table {{ width:100%; border-collapse:collapse; font-size:13px; }} th, td {{ padding:10px; border-bottom:1px solid #eee; text-align:left; vertical-align:top; }} th {{ background:#222; color:white; position:sticky; top:0; }} tr:hover {{ background:#fff7cc; }}
              .tablewrap {{ max-height:560px; overflow:auto; border:1px solid #eee; border-radius:12px; }}
              .pill {{ display:inline-block; padding:5px 9px; border-radius:999px; font-weight:800; font-size:12px; }} .Red {{ background:#ffe1e1; color:#b00000; }} .Amber {{ background:#fff1d6; color:#8a4e00; }} .Green {{ background:#e3f6e9; color:#0b6b2d; }} .Grey {{ background:#eee; color:#444; }}
              .doclist a {{ display:block; margin:8px 0; color:#111; font-weight:700; }} .small {{ font-size:12px; color:#666; }}
              .drawer {{ display:none; margin-top:12px; padding:16px; border-left:5px solid var(--red); background:#fffdf0; border-radius:12px; }} .drawer.open {{ display:block; }}
              textarea {{ width:100%; min-height:160px; border-radius:12px; border:1px solid #ccc; padding:12px; }}
              @media(max-width:1000px) {{ .grid {{ grid-template-columns:1fr; }} .cards {{ grid-template-columns:1fr 1fr; }} }}
            </style>
          </head>
          <body>
            <header><div class=\"brand\"><div class=\"logo\">Kruidvat</div><div><b>AS Watson Pilot</b><br/>Promo & Price Advisory AI Agent</div></div></header>
            <main>
              <section class=\"hero\">
                <h1>Kruidvat Promo & Price Advisor Agent</h1>
                <p class=\"muted\">Hosted workshop app. Download the supplied upload documents below, upload them in the left panel, then run the advisory scan. The app demonstrates the AI advisory layer: it explains price gaps, applies margin and policy guardrails, classifies risk and recommends the next safe human action.</p>
                <a class=\"button yellow\" href=\"workshop-documents/ASW_Kruidvat_Upload_Documents.zip\" download>Download all upload documents</a>
                <a class=\"button secondary\" href=\"workshop-documents/ASW_Kruidvat_Price_Advisor_Data_Pack_EN.xlsx\" download>Download Excel data pack</a>
              </section>
              <div class=\"grid\">
                <aside class=\"panel\">
                  <h2>1. Upload workshop documents</h2>
                  <div class=\"doclist\">
                    <a href=\"workshop-documents/01_Workshop_Briefing_ASW_Kruidvat_Price_Agent_EN.docx\" download>01 Workshop Briefing</a>
                    <a href=\"workshop-documents/02_RAG_Pricing_Margin_Policy_SYNTHETIC_EN.docx\" download>02 RAG Pricing & Margin Policy</a>
                    <a href=\"workshop-documents/03_RAG_Promotion_Matching_AI_Action_Rules_EN.docx\" download>03 RAG Promotion & Matching Rules</a>
                    <a href=\"workshop-documents/04_Master_Prompt_Template_ASW_Kruidvat_EN.docx\" download>04 Master Prompt Template</a>
                    <a href=\"workshop-documents/kruidvat_agent_acceptance_tests.yaml\" download>Acceptance test YAML</a>
                  </div>
                  <label>Upload Excel data pack</label><input id=\"dataUpload\" type=\"file\" accept=\".xlsx,.csv\" />
                  <label>Upload RAG documents</label><input id=\"ragUpload\" type=\"file\" multiple accept=\".docx,.txt,.md,.pdf\" />
                  <div id=\"uploaded\" class=\"small\">No files uploaded yet. Built-in workshop data is available.</div>
                  <button onclick=\"markLoaded()\">Mark documents loaded</button>
                  <hr/>
                  <h2>2. Filters</h2>
                  <label>Product group</label><select id=\"groupFilter\"><option>All</option><option>Sun Care</option><option>Baby Wipes</option><option>Oral Care</option></select>
                  <label>AI label</label><select id=\"labelFilter\"><option>All</option>{''.join(f'<option>{l["label"]}</option>' for l in labels)}</select>
                  <button onclick=\"runScan()\">Run advisory scan</button>
                  <button class=\"secondary\" onclick=\"exportCsv()\">Export alerts CSV</button>
                </aside>
                <section>
                  <div class=\"cards\">
                    <div class=\"card\"><div class=\"metric\" id=\"mProducts\">0</div><div class=\"label\">Products scanned</div></div>
                    <div class=\"card\"><div class=\"metric\">13</div><div class=\"label\">Competitors in scope</div></div>
                    <div class=\"card\"><div class=\"metric\" id=\"mMatches\">0</div><div class=\"label\">Matches/evidence items</div></div>
                    <div class=\"card\"><div class=\"metric\" id=\"mRed\">0</div><div class=\"label\">Red risk alerts</div></div>
                    <div class=\"card\"><div class=\"metric\" id=\"mManual\">0</div><div class=\"label\">Manual review cases</div></div>
                  </div>
                  <div class=\"panel\">
                    <h2>Alert dashboard</h2>
                    <div class=\"tablewrap\"><table><thead><tr><th>Product</th><th>Group</th><th>Competitor</th><th>AI label</th><th>Risk</th><th>Confidence</th><th>Unit price gap</th><th>Action</th></tr></thead><tbody id=\"alertBody\"></tbody></table></div>
                    <div id=\"drawer\" class=\"drawer\"></div>
                  </div>
                  <div class=\"panel\">
                    <h2>Daily Price Brief</h2>
                    <textarea id=\"brief\"></textarea><br/>
                    <button onclick=\"copyBrief()\">Copy brief</button>
                  </div>
                </section>
              </div>
            </main>
            <script>
              const ALL_ALERTS = {json.dumps(alerts)};
              let currentAlerts = [];
              function markLoaded() {{
                const d = document.getElementById('dataUpload').files[0];
                const r = Array.from(document.getElementById('ragUpload').files).map(f=>f.name);
                document.getElementById('uploaded').innerHTML = '<b>Loaded:</b><br>' + (d ? d.name : 'Built-in Excel data pack') + '<br>' + (r.length ? r.join('<br>') : 'Built-in RAG policy documents');
              }}
              function runScan() {{
                const g = document.getElementById('groupFilter').value;
                const l = document.getElementById('labelFilter').value;
                currentAlerts = ALL_ALERTS.filter(a => (g==='All'||a.productGroup===g) && (l==='All'||a.label===l));
                render();
              }}
              function render() {{
                document.getElementById('mProducts').textContent = new Set(currentAlerts.map(a=>a.sku)).size;
                document.getElementById('mMatches').textContent = currentAlerts.length;
                document.getElementById('mRed').textContent = currentAlerts.filter(a=>a.risk==='Red').length;
                document.getElementById('mManual').textContent = currentAlerts.filter(a=>a.label==='Manual Review').length;
                const body = document.getElementById('alertBody');
                body.innerHTML = currentAlerts.slice(0, 200).map((a,i)=>`<tr onclick=\"showEvidence(${{i}})\"><td><b>${{a.productName}}</b><br><span class=small>${{a.sku}}</span></td><td>${{a.productGroup}}</td><td>${{a.competitor}}</td><td><b>${{a.label}}</b></td><td><span class=\"pill ${{a.risk}}\">${{a.risk}}</span></td><td>${{a.confidence}}%</td><td>${{a.ownUnitPrice}} vs ${{a.competitorUnitPrice}} ${{a.unitLabel}}</td><td>${{a.recommendedAction}}</td></tr>`).join('');
                buildBrief();
              }}
              function showEvidence(i) {{
                const a = currentAlerts[i];
                const d = document.getElementById('drawer');
                d.className = 'drawer open';
                d.innerHTML = `<h3>Evidence and reasoning</h3><p><b>${{a.productName}}</b></p><ul><li>Source: <a href=\"${{a.sourceUrl}}\" target=\"_blank\">${{a.sourceUrl}}</a></li><li>Timestamp: ${{a.timestamp}}</li><li>Promotion text: ${{a.promoText}}</li><li>Kruidvat price: EUR ${{a.ownPrice}} | competitor price: EUR ${{a.competitorPrice}}</li><li>Normalized: ${{a.ownUnitPrice}} vs ${{a.competitorUnitPrice}} ${{a.unitLabel}}</li><li>Margin after match: ${{a.marginAfterMatchPct}}% | minimum margin: ${{a.minMarginPct}}%</li><li>Price floor ex VAT: EUR ${{a.priceFloorExVat}}</li><li>AI label: <b>${{a.label}}</b> | confidence: ${{a.confidence}}%</li><li>Human check: ${{a.humanCheck}}</li></ul>`;
              }}
              function buildBrief() {{
                const counts = {{}}; currentAlerts.forEach(a => counts[a.label] = (counts[a.label]||0)+1);
                const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${{k}}: ${{v}}`).join(', ');
                const red = currentAlerts.filter(a=>a.risk==='Red').slice(0,5).map(a=>`- ${{a.productName}}: ${{a.label}} against ${{a.competitor}}. ${{a.recommendedAction}}`).join('\n');
                document.getElementById('brief').value = `Daily Promo & Price Brief\n\nScope: Sun Care, Baby Wipes and Oral Care. Competitors: Etos, Albert Heijn, Trekpleister, DA, De Online Drogist, Drogist.nl, Plein.nl, bol.com, Amazon.nl, Action, Die Grenze, Jumbo and PLUS.\n\nProducts/evidence items reviewed: ${{currentAlerts.length}}. Alert mix: ${{top}}.\n\nPriority actions:\n${{red || '- No red risk alerts in the current filter.'}}\n\nHuman-in-the-loop reminder: no automatic price changes. Confirm source evidence, stock, pack size and policy constraints before action.`;
              }}
              function copyBrief() {{ navigator.clipboard.writeText(document.getElementById('brief').value); }}
              function exportCsv() {{
                const cols = ['sku','productGroup','productName','competitor','label','risk','confidence','ownPrice','competitorPrice','promoText','marginAfterMatchPct','recommendedAction','sourceUrl'];
                const rows = [cols.join(',')].concat(currentAlerts.map(a => cols.map(c => '"'+String(a[c]).replaceAll('"','""')+'"').join(',')));
                const blob = new Blob([rows.join('\n')], {{type:'text/csv'}}); const url = URL.createObjectURL(blob); const link = document.createElement('a'); link.href=url; link.download='kruidvat_price_alerts.csv'; link.click(); URL.revokeObjectURL(url);
              }}
              runScan();
            </script>
          </body></html>"""
          (site / "index.html").write_text(html, encoding="utf-8")
          (site / ".nojekyll").write_text("", encoding="utf-8")
          PY

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
