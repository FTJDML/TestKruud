name: Deploy Kruidvat Price Advisory Agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Generate and deploy workshop app
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate static app and upload documents
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site/data _site/workshop-documents

          python3 - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import random
          import zipfile
          from datetime import datetime, timezone
          from xml.sax.saxutils import escape

          root = Path('_site')
          data_dir = root / 'data'
          doc_dir = root / 'workshop-documents'
          now = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          random.seed(42)

          competitors = [
              {'name': 'Etos', 'type': 'Direct external drogist', 'role': 'Primary benchmark'},
              {'name': 'Albert Heijn', 'type': 'Cross-channel grocery', 'role': 'Cross-channel benchmark'},
              {'name': 'Trekpleister', 'type': 'Internal AS Watson banner', 'role': 'Banner alignment benchmark'},
              {'name': 'DA', 'type': 'External drogist', 'role': 'Drogist benchmark'},
              {'name': 'De Online Drogist', 'type': 'Online drogist', 'role': 'Online price pressure'},
              {'name': 'Drogist.nl', 'type': 'Online drogist', 'role': 'Online price pressure'},
              {'name': 'Plein.nl', 'type': 'Online retailer', 'role': 'Pack-size and online benchmark'},
              {'name': 'bol.com', 'type': 'Marketplace', 'role': 'Marketplace signal only'},
              {'name': 'Amazon.nl', 'type': 'Marketplace', 'role': 'Marketplace signal only'},
              {'name': 'Action', 'type': 'Value retailer', 'role': 'Value perception benchmark'},
              {'name': 'Die Grenze', 'type': 'Deal retailer', 'role': 'Promo attack radar'},
              {'name': 'Jumbo', 'type': 'Cross-channel grocery', 'role': 'Grocery benchmark'},
              {'name': 'PLUS', 'type': 'Cross-channel grocery', 'role': 'Grocery benchmark'},
          ]

          def money(x):
              return round(float(x) + 1e-9, 2)

          def mk_sku(prefix, n):
              return f'{prefix}-{n:03d}'

          products = []

          sun_brands = ['Kruidvat Solait', 'NIVEA Sun', 'Garnier Ambre Solaire', 'Biodermal', 'Australian Gold', 'Lancaster', 'La Roche-Posay', 'Naif', 'Vision', 'Eucerin']
          sun_forms = ['Spray', 'Lotion', 'Cream', 'Kids Spray', 'Face Fluid', 'After Sun']
          spfs = ['SPF15', 'SPF30', 'SPF50', 'SPF50+']
          sizes = [50, 100, 150, 200, 250, 300]
          n = 1
          while n <= 245:
              brand = sun_brands[(n - 1) % len(sun_brands)]
              form = sun_forms[(n * 3) % len(sun_forms)]
              spf = spfs[(n * 5) % len(spfs)]
              size = sizes[(n * 7) % len(sizes)]
              private_label = brand == 'Kruidvat Solait'
              base = 5.49 + (size / 100.0) * 3.1 + (0 if private_label else 4.2) + ((n % 9) * 0.75)
              price = money(base)
              cost = money((price / 1.21) * (0.48 if private_label else 0.62))
              products.append({
                  'sku': mk_sku('SUN', n),
                  'product_group': 'Sun Care',
                  'brand': brand,
                  'product_name': f'{brand} {form} {spf} {size}ml',
                  'pack_size': f'{size} ml',
                  'unit_count': size,
                  'unit_type': 'ml',
                  'kruidvat_price_inc_vat': price,
                  'synthetic_cost_ex_vat': cost,
                  'min_margin_pct': 0.28 if private_label else 0.18,
                  'price_floor_ex_vat': money(cost / (1 - (0.28 if private_label else 0.18))),
                  'kvi_flag': bool(n % 11 == 0),
                  'private_label_flag': private_label,
                  'promo_lock_flag': bool(n % 19 == 0),
                  'supplier_funding_per_unit': money(0.35 if (not private_label and n % 5 == 0) else 0),
                  'snapshot_promo_text': 'Kruidvat Club offer' if n % 13 == 0 else ('1+1 free' if n % 17 == 0 else 'No current promotion'),
                  'source_url': f'https://www.kruidvat.nl/sun-care-demo-{n}'
              })
              n += 1

          baby_brands = ['Kruidvat', 'Pampers', 'WaterWipes', 'Zwitsal', 'Huggies', 'Naif']
          baby_variants = ['Sensitive', 'Aqua Pure', 'Plastic Free', 'Pure Water', 'Fragrance Free', 'Lotion']
          baby_packs = [(1, 56), (4, 52), (6, 60), (9, 60), (12, 72), (12, 65), (24, 52)]
          for n in range(1, 43):
              brand = baby_brands[(n - 1) % len(baby_brands)]
              variant = baby_variants[(n * 2) % len(baby_variants)]
              packs, per_pack = baby_packs[(n * 3) % len(baby_packs)]
              total = packs * per_pack
              private_label = brand == 'Kruidvat'
              price = money(1.49 + total * (0.012 if private_label else 0.018) + ((n % 5) * 0.5))
              cost = money((price / 1.21) * (0.52 if private_label else 0.68))
              products.append({
                  'sku': mk_sku('BABY', n),
                  'product_group': 'Baby Wipes',
                  'brand': brand,
                  'product_name': f'{brand} {variant} Baby Wipes {packs} x {per_pack}',
                  'pack_size': f'{packs} x {per_pack} wipes',
                  'unit_count': total,
                  'unit_type': 'wipe',
                  'kruidvat_price_inc_vat': price,
                  'synthetic_cost_ex_vat': cost,
                  'min_margin_pct': 0.35 if private_label else 0.16,
                  'price_floor_ex_vat': money(cost / (1 - (0.35 if private_label else 0.16))),
                  'kvi_flag': bool(n % 7 == 0),
                  'private_label_flag': private_label,
                  'promo_lock_flag': bool(n % 12 == 0),
                  'supplier_funding_per_unit': money(0.25 if (not private_label and n % 4 == 0) else 0),
                  'snapshot_promo_text': '2nd half price' if n % 8 == 0 else ('No current promotion'),
                  'source_url': f'https://www.kruidvat.nl/baby-wipes-demo-{n}'
              })

          oral_brands = ['Kruidvat', 'Sensodyne', 'Oral-B', 'Colgate', 'Elmex', 'Aquafresh', 'Zendium', 'Listerine']
          oral_types = ['Toothpaste', 'Mouthwash', 'Brush Heads', 'Whitening Toothpaste', 'Sensitive Toothpaste', 'Kids Toothpaste']
          oral_sizes = [50, 75, 100, 125, 500, 750]
          for n in range(1, 169):
              brand = oral_brands[(n - 1) % len(oral_brands)]
              typ = oral_types[(n * 2) % len(oral_types)]
              size = oral_sizes[(n * 5) % len(oral_sizes)]
              unit_type = 'piece' if 'Brush' in typ else 'ml'
              unit_count = 4 if unit_type == 'piece' else size
              private_label = brand == 'Kruidvat'
              price = money(1.99 + (size / 100.0) * 1.35 + (0 if private_label else 2.25) + ((n % 6) * 0.55))
              if unit_type == 'piece':
                  price = money(8.99 + (n % 7) * 1.6)
              cost = money((price / 1.21) * (0.50 if private_label else 0.64))
              products.append({
                  'sku': mk_sku('ORAL', n),
                  'product_group': 'Oral Care',
                  'brand': brand,
                  'product_name': f'{brand} {typ} {unit_count}{unit_type if unit_type == "ml" else " pcs"}',
                  'pack_size': f'{unit_count} {unit_type}',
                  'unit_count': unit_count,
                  'unit_type': unit_type,
                  'kruidvat_price_inc_vat': price,
                  'synthetic_cost_ex_vat': cost,
                  'min_margin_pct': 0.32 if private_label else 0.17,
                  'price_floor_ex_vat': money(cost / (1 - (0.32 if private_label else 0.17))),
                  'kvi_flag': bool(n % 10 == 0),
                  'private_label_flag': private_label,
                  'promo_lock_flag': bool(n % 21 == 0),
                  'supplier_funding_per_unit': money(0.15 if (not private_label and n % 6 == 0) else 0),
                  'snapshot_promo_text': '25% off' if n % 14 == 0 else ('No current promotion'),
                  'source_url': f'https://www.kruidvat.nl/oral-care-demo-{n}'
              })

          # Write data files for the app.
          (data_dir / 'products.json').write_text(json.dumps(products, indent=2), encoding='utf-8')
          (data_dir / 'competitors.json').write_text(json.dumps(competitors, indent=2), encoding='utf-8')

          with open(data_dir / 'kruidvat_category_snapshot_pilot.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=list(products[0].keys()))
              writer.writeheader()
              writer.writerows(products)

          with open(data_dir / 'competitor_scope_all_included.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=['name', 'type', 'role'])
              writer.writeheader()
              writer.writerows(competitors)

          def col_name(index):
              result = ''
              while index:
                  index, rem = divmod(index - 1, 26)
                  result = chr(65 + rem) + result
              return result

          def create_xlsx(path, sheets):
              with zipfile.ZipFile(path, 'w', zipfile.ZIP_DEFLATED) as z:
                  overrides = []
                  rels = []
                  workbook_sheets = []
                  for idx, (sheet_name, rows) in enumerate(sheets, start=1):
                      safe_name = escape(sheet_name[:31])
                      workbook_sheets.append(f'<sheet name="{safe_name}" sheetId="{idx}" r:id="rId{idx}"/>')
                      rels.append(f'<Relationship Id="rId{idx}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet{idx}.xml"/>')
                      overrides.append(f'<Override PartName="/xl/worksheets/sheet{idx}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>')
                      sheet_rows = []
                      for r_idx, row in enumerate(rows, start=1):
                          cells = []
                          for c_idx, value in enumerate(row, start=1):
                              ref = f'{col_name(c_idx)}{r_idx}'
                              if isinstance(value, (int, float)) and not isinstance(value, bool):
                                  cells.append(f'<c r="{ref}"><v>{value}</v></c>')
                              else:
                                  text = escape(str(value))
                                  cells.append(f'<c r="{ref}" t="inlineStr"><is><t>{text}</t></is></c>')
                          sheet_rows.append(f'<row r="{r_idx}">{"".join(cells)}</row>')
                      sheet_xml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' + '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>' + ''.join(sheet_rows) + '</sheetData></worksheet>'
                      z.writestr(f'xl/worksheets/sheet{idx}.xml', sheet_xml)
                  z.writestr('[Content_Types].xml', '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>' + ''.join(overrides) + '</Types>')
                  z.writestr('_rels/.rels', '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')
                  z.writestr('xl/workbook.xml', '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>' + ''.join(workbook_sheets) + '</sheets></workbook>')
                  z.writestr('xl/_rels/workbook.xml.rels', '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' + ''.join(rels) + '</Relationships>')

          product_headers = list(products[0].keys())
          product_rows = [product_headers] + [[p[h] for h in product_headers] for p in products]
          competitor_rows = [['name', 'type', 'role']] + [[c['name'], c['type'], c['role']] for c in competitors]
          test_rows = [
              ['test_id', 'scenario', 'expected_ai_label'],
              ['TC_PRICE_ALERT', 'External exact match is cheaper and margin is safe', 'Price Alert'],
              ['TC_PROMO_MARGIN', 'Competitor promotion is lower but matching breaks margin', 'Margin Block'],
              ['TC_BANNER', 'Trekpleister differs from Kruidvat', 'Banner Alignment Alert'],
              ['TC_PRIVATE_LABEL', 'Private-label value gap is unclear', 'Private Label Value Gap'],
              ['TC_MANUAL_REVIEW', 'Pack size or marketplace seller is uncertain', 'Manual Review'],
              ['TC_OPPORTUNITY', 'Kruidvat is cheaper and margin-safe', 'Opportunity'],
          ]
          create_xlsx(doc_dir / 'ASW_Kruidvat_Price_Advisor_Data_Pack_EN.xlsx', [
              ('Products', product_rows),
              ('Competitors', competitor_rows),
              ('Acceptance tests', test_rows),
          ])

          def create_docx(path, title, paragraphs):
              body = []
              body.append(f'<w:p><w:r><w:rPr><w:b/><w:sz w:val="32"/></w:rPr><w:t>{escape(title)}</w:t></w:r></w:p>')
              for p in paragraphs:
                  if isinstance(p, (list, tuple)):
                      for item in p:
                          body.append(f'<w:p><w:pPr><w:numPr><w:ilvl w:val="0"/><w:numId w:val="1"/></w:numPr></w:pPr><w:r><w:t>{escape(str(item))}</w:t></w:r></w:p>')
                  else:
                      body.append(f'<w:p><w:r><w:t>{escape(str(p))}</w:t></w:r></w:p>')
              document_xml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>' + ''.join(body) + '<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440"/></w:sectPr></w:body></w:document>'
              with zipfile.ZipFile(path, 'w', zipfile.ZIP_DEFLATED) as z:
                  z.writestr('[Content_Types].xml', '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>')
                  z.writestr('_rels/.rels', '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>')
                  z.writestr('word/document.xml', document_xml)

          create_docx(doc_dir / '01_Workshop_Briefing_ASW_Kruidvat_Price_Agent_EN.docx', 'AS Watson / Kruidvat Promo & Price Advisory AI Agent Workshop', [
              'Business challenge: Kruidvat is under pressure from price perception and fast-moving competitor pricing. The agent must turn competitor signals into human-approved commercial advice.',
              'Pilot scope: Sun Care, Baby Wipes and Oral Care. All competitors are in scope: Etos, Albert Heijn, Trekpleister, DA, De Online Drogist, Drogist.nl, Plein.nl, bol.com, Amazon.nl, Action, Die Grenze, Jumbo and PLUS.',
              'Minimum functionality:',
              ['Upload or load data pack and RAG documents.', 'Run a scan across the three product groups.', 'Match products and show confidence.', 'Interpret promotions.', 'Normalize prices.', 'Check margin and price floor.', 'Generate AI action labels and a Daily Price Brief.', 'Show evidence and export alerts.'],
              'Human-in-the-loop rule: the agent may advise only. It may never change prices automatically.',
          ])

          create_docx(doc_dir / '02_RAG_Pricing_Margin_Policy_SYNTHETIC_EN.docx', 'Synthetic Pricing and Margin Policy', [
              'This document is synthetic workshop data. It does not contain real AS Watson or Kruidvat commercial data.',
              'Internal policy overrides external live web evidence. External evidence is only used for current competitor price, promotion and availability signals.',
              'Rules:',
              ['Never recommend a price below the synthetic price floor.', 'If matching a competitor would break minimum margin, label the alert as Margin Block.', 'KVI products may receive more aggressive advice but still require human approval.', 'Private-label products must not be treated as exact matches for A-brands.', 'Trekpleister is an internal banner benchmark, not an external competitor.', 'Marketplace listings require Manual Review unless seller, pack size and shipping are clear.'],
          ])

          create_docx(doc_dir / '03_RAG_Promotion_Matching_AI_Action_Rules_EN.docx', 'Promotion, Matching and AI Action Rules', [
              'Promotion parser rules:',
              ['1+1 free equals 50 percent effective discount when buying two.', 'Second half price equals 25 percent effective discount when buying two.', '3 for 2 equals 33.3 percent effective discount when buying three.', 'Percentage discounts are applied to current visible price.', 'Loyalty-only, online-only or future promotions must be flagged in evidence.'],
              'Matching rules:',
              ['Exact EAN or same brand, variant, size and pack count is high-confidence.', 'Different pack sizes may be normalized but require a confidence note.', 'Private-label equivalents are functional benchmarks only.', 'Marketplace and out-of-stock sources are not safe for automatic advice.'],
              'AI labels: Price Alert, Promo Attack, Margin Block, Banner Alignment Alert, Private Label Value Gap, Manual Review and Opportunity.',
          ])

          create_docx(doc_dir / '04_Master_Prompt_Template_ASW_Kruidvat_EN.docx', 'Master Prompt Template', [
              'Role and goal: You are a Kruidvat Promo and Price Advisory Agent. Your task is to classify price and promotion signals and recommend the next safe human action.',
              'Business context: Consumers report that competitors are cheaper. Category teams need faster, grounded and margin-aware advice.',
              'Sources: Use the data pack for Kruidvat price, synthetic cost and margin. Use RAG policy documents for rules. Use live public web sources only for competitor evidence.',
              'Rules and guardrails: no invented prices, no automatic price changes, no advice below price floor, no exact match for private-label alternatives, and human review for uncertain evidence.',
              'Output schema: KPI summary, alert table, evidence drawer, margin reasoning, recommended action and Daily Price Brief.',
              'Self-check: list missing evidence, uncertain matches, stale sources and unsupported claims.',
          ])

          acceptance_yaml = "\n".join([
              "version: 1",
              "owner: AS Watson / Kruidvat workshop",
              "purpose: Validate the Promo and Price Advisory AI Agent",
              "pilot_scope:",
              "  product_groups_required:",
              "    - Sun Care",
              "    - Baby Wipes",
              "    - Oral Care",
              "  competitors_required:",
              "    - Etos",
              "    - Albert Heijn",
              "    - Trekpleister",
              "    - DA",
              "    - De Online Drogist",
              "    - Drogist.nl",
              "    - Plein.nl",
              "    - bol.com",
              "    - Amazon.nl",
              "    - Action",
              "    - Die Grenze",
              "    - Jumbo",
              "    - PLUS",
              "ai_labels_allowed:",
              "  - Price Alert",
              "  - Promo Attack",
              "  - Margin Block",
              "  - Banner Alignment Alert",
              "  - Private Label Value Gap",
              "  - Manual Review",
              "  - Opportunity",
              "critical_failures:",
              "  - Automatic price change",
              "  - Advice below price floor",
              "  - Invented price or URL",
              "  - Oral Care missing",
              "  - Competitors treated as stretch",
              "  - Marketplace direct response without Manual Review",
              "",
          ])
          (doc_dir / 'kruidvat_agent_acceptance_tests.yaml').write_text(acceptance_yaml, encoding='utf-8')

          # Bundle all upload documents.
          with zipfile.ZipFile(doc_dir / 'ASW_Kruidvat_Upload_Documents.zip', 'w', zipfile.ZIP_DEFLATED) as bundle:
              for item in sorted(doc_dir.iterdir()):
                  if item.name != 'ASW_Kruidvat_Upload_Documents.zip':
                      bundle.write(item, arcname=item.name)
              bundle.write(data_dir / 'kruidvat_category_snapshot_pilot.csv', arcname='kruidvat_category_snapshot_pilot.csv')
              bundle.write(data_dir / 'competitor_scope_all_included.csv', arcname='competitor_scope_all_included.csv')

          index_html = r'''<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Kruidvat Promo & Price Advisory Agent</title>
            <style>
              :root { --red: #e30613; --yellow: #ffd500; --ink: #222; --muted: #6b7280; --bg: #f5f5f5; --card: #fff; --green: #087f5b; --amber: #b7791f; --line: #e5e7eb; }
              * { box-sizing: border-box; }
              body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--ink); }
              header { background: var(--red); color: #fff; border-bottom: 10px solid var(--yellow); padding: 22px 28px; }
              .brand { display: flex; gap: 16px; align-items: center; }
              .logo { background: var(--yellow); color: var(--red); font-weight: 900; padding: 10px 18px; border-radius: 10px; font-size: 28px; letter-spacing: -.5px; }
              .wrap { max-width: 1440px; margin: 0 auto; padding: 22px; }
              .hero { background: #fff; border-radius: 18px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,.07); display: grid; grid-template-columns: 1.35fr .65fr; gap: 20px; }
              h1 { margin: 0 0 8px; font-size: 34px; }
              h2 { margin: 0 0 12px; }
              p { line-height: 1.5; }
              .sub { color: var(--muted); font-size: 17px; }
              .btn { border: 0; background: var(--red); color: #fff; padding: 11px 16px; border-radius: 10px; font-weight: 800; cursor: pointer; text-decoration: none; display: inline-block; margin: 4px 6px 4px 0; }
              .btn.alt { background: #111827; }
              .btn.yellow { background: var(--yellow); color: #111; }
              .btn.ghost { background: white; color: var(--red); border: 2px solid var(--red); }
              .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 18px 0; }
              .card { background: var(--card); border-radius: 16px; padding: 18px; box-shadow: 0 6px 18px rgba(0,0,0,.06); }
              .metric { font-size: 30px; font-weight: 900; color: var(--red); }
              .label { color: var(--muted); font-size: 13px; margin-top: 4px; }
              .panel { background: #fff; border-radius: 18px; padding: 20px; margin-top: 18px; box-shadow: 0 6px 18px rgba(0,0,0,.06); }
              .layout { display: grid; grid-template-columns: 280px 1fr 360px; gap: 18px; align-items: start; }
              select, input[type=file], input[type=text] { width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: #fff; margin: 6px 0 12px; }
              table { width: 100%; border-collapse: collapse; font-size: 13px; }
              th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
              th { background: #fafafa; position: sticky; top: 0; z-index: 1; }
              .tablewrap { max-height: 590px; overflow: auto; border: 1px solid var(--line); border-radius: 12px; }
              .pill { display: inline-block; padding: 5px 9px; border-radius: 999px; font-weight: 800; font-size: 12px; }
              .risk-high { background: #fee2e2; color: #991b1b; }
              .risk-med { background: #fef3c7; color: #92400e; }
              .risk-low { background: #dcfce7; color: #166534; }
              .evidence { white-space: pre-wrap; background: #111827; color: #e5e7eb; padding: 14px; border-radius: 12px; font-size: 12px; line-height: 1.5; }
              .brief { white-space: pre-wrap; background: #fff7d6; border: 1px solid #f2c94c; padding: 14px; border-radius: 12px; }
              .docs a { display: block; color: var(--red); text-decoration: none; margin: 7px 0; font-weight: 700; }
              .small { font-size: 12px; color: var(--muted); }
              .loaded { background: #f9fafb; border: 1px dashed #cbd5e1; border-radius: 12px; padding: 10px; font-size: 12px; min-height: 56px; }
              @media (max-width: 1100px) { .hero, .layout { grid-template-columns: 1fr; } .grid { grid-template-columns: repeat(2, 1fr); } }
              @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
            </style>
          </head>
          <body>
            <header>
              <div class="brand">
                <div class="logo">Kruidvat</div>
                <div><strong>AS Watson Pilot</strong><br>Promo & Price Advisory AI Agent</div>
              </div>
            </header>
            <main class="wrap">
              <section class="hero">
                <div>
                  <h1>Promo & Price Advisory Agent</h1>
                  <p class="sub">A hosted workshop agent that goes beyond price tracking: it classifies competitor signals, applies synthetic margin and price-floor policy, and recommends the next safe human action.</p>
                  <a class="btn yellow" href="workshop-documents/ASW_Kruidvat_Upload_Documents.zip">Download all upload documents</a>
                  <button class="btn" id="runBtn">Run AI advisory scan</button>
                  <button class="btn ghost" id="exportBtn">Export alerts CSV</button>
                </div>
                <div class="docs">
                  <strong>Upload documents</strong>
                  <a href="workshop-documents/ASW_Kruidvat_Price_Advisor_Data_Pack_EN.xlsx">Data Pack XLSX</a>
                  <a href="workshop-documents/01_Workshop_Briefing_ASW_Kruidvat_Price_Agent_EN.docx">Workshop Briefing DOCX</a>
                  <a href="workshop-documents/02_RAG_Pricing_Margin_Policy_SYNTHETIC_EN.docx">Pricing & Margin Policy DOCX</a>
                  <a href="workshop-documents/03_RAG_Promotion_Matching_AI_Action_Rules_EN.docx">Promotion & Matching Rules DOCX</a>
                  <a href="workshop-documents/04_Master_Prompt_Template_ASW_Kruidvat_EN.docx">Master Prompt Template DOCX</a>
                  <a href="workshop-documents/kruidvat_agent_acceptance_tests.yaml">YAML Acceptance Spec</a>
                  <div class="small">Generated on ''' + now + r'''. Commercial data is synthetic.</div>
                </div>
              </section>

              <section class="grid" id="kpis"></section>

              <section class="layout">
                <aside class="panel">
                  <h2>Controls</h2>
                  <label>Product group</label>
                  <select id="groupFilter"><option>All</option><option>Sun Care</option><option>Baby Wipes</option><option>Oral Care</option></select>
                  <label>AI label</label>
                  <select id="labelFilter"><option>All</option><option>Price Alert</option><option>Promo Attack</option><option>Margin Block</option><option>Banner Alignment Alert</option><option>Private Label Value Gap</option><option>Manual Review</option><option>Opportunity</option></select>
                  <label>Competitor</label>
                  <select id="competitorFilter"><option>All</option></select>
                  <label>RAG upload simulation</label>
                  <input type="file" id="ragUpload" multiple>
                  <div class="loaded" id="loadedDocs">No documents uploaded yet. Download the supplied documents above and upload them here for workshop simulation.</div>
                  <p class="small">This static GitHub Pages version uses generated synthetic competitor evidence. Add a backend later for real live web search and API keys.</p>
                </aside>

                <section class="panel">
                  <h2>Priority alert dashboard</h2>
                  <div class="tablewrap">
                    <table>
                      <thead><tr><th>Product</th><th>Competitor</th><th>AI label</th><th>Risk</th><th>Confidence</th><th>Margin</th><th>Recommended action</th></tr></thead>
                      <tbody id="alertsBody"></tbody>
                    </table>
                  </div>
                </section>

                <aside class="panel">
                  <h2>Evidence drawer</h2>
                  <div id="evidence" class="evidence">Run the scan and select an alert.</div>
                  <h2 style="margin-top:18px">Daily Price Brief</h2>
                  <div id="brief" class="brief">Run the scan to generate a copyable management brief.</div>
                </aside>
              </section>
            </main>

            <script>
              let products = [];
              let competitors = [];
              let alerts = [];
              let selectedAlert = null;

              const euro = new Intl.NumberFormat('nl-NL', { style: 'currency', currency: 'EUR' });

              function hashText(text) {
                let h = 2166136261;
                for (let i = 0; i < text.length; i++) {
                  h ^= text.charCodeAt(i);
                  h = Math.imul(h, 16777619);
                }
                return Math.abs(h >>> 0);
              }

              function round2(value) { return Math.round(value * 100) / 100; }

              function unitBasis(product) {
                if (product.product_group === 'Sun Care') return 100;
                if (product.product_group === 'Baby Wipes') return 1;
                if (product.unit_type === 'piece') return 1;
                return product.unit_count >= 300 ? 100 : 75;
              }

              function unitPrice(totalPrice, product) {
                return round2((Number(totalPrice) / Number(product.unit_count)) * unitBasis(product));
              }

              function promoFromHash(h) {
                const r = h % 100;
                if (r < 8) return { text: '1+1 free', factor: 0.5, kind: 'multi-buy' };
                if (r < 16) return { text: '2nd half price', factor: 0.75, kind: 'multi-buy' };
                if (r < 23) return { text: '25% off', factor: 0.75, kind: 'discount' };
                if (r < 28) return { text: '3 for 2', factor: 0.667, kind: 'multi-buy' };
                if (r < 31) return { text: 'Loyalty only offer', factor: 0.85, kind: 'loyalty' };
                return { text: 'No visible promotion', factor: 1, kind: 'regular' };
              }

              function marginStatus(product, effectivePriceIncVat) {
                const exVat = Number(effectivePriceIncVat) / 1.21;
                const cost = Number(product.synthetic_cost_ex_vat);
                const funding = Number(product.supplier_funding_per_unit || 0);
                const margin = exVat <= 0 ? -1 : (exVat - cost + funding) / exVat;
                const floorBroken = exVat < Number(product.price_floor_ex_vat);
                const minBroken = margin < Number(product.min_margin_pct);
                return { margin, floorBroken, minBroken, safe: !floorBroken && !minBroken };
              }

              function labelFor(product, competitor, matchConfidence, promo, competitorEffective, ownUnit, compUnit, margin) {
                const lower = compUnit < ownUnit * 0.97;
                if (matchConfidence < 80) return 'Manual Review';
                if (competitor.name === 'Trekpleister' && lower) return 'Banner Alignment Alert';
                if (competitor.type === 'Marketplace' && lower) return 'Manual Review';
                if (product.private_label_flag && lower && competitor.name !== 'Trekpleister') return 'Private Label Value Gap';
                if (lower && !margin.safe) return 'Margin Block';
                if (lower && promo.kind !== 'regular') return 'Promo Attack';
                if (lower) return 'Price Alert';
                if (compUnit > ownUnit * 1.08 && margin.safe) return 'Opportunity';
                return 'Opportunity';
              }

              function actionFor(label, product, competitor, promo) {
                if (label === 'Price Alert') return 'Consider tactical response only if policy and human approval confirm it.';
                if (label === 'Promo Attack') return 'Avoid permanent price change; consider coupon, bundle or funded campaign response.';
                if (label === 'Margin Block') return 'Do not match; matching would break margin or price floor. Escalate for supplier funding or approval.';
                if (label === 'Banner Alignment Alert') return 'Internal banner review only; do not treat Trekpleister as external competition.';
                if (label === 'Private Label Value Gap') return 'Review own-label positioning and communication; do not exact-match with A-brands.';
                if (label === 'Manual Review') return 'No automated advice. Validate seller, pack size, availability and evidence manually.';
                return 'Keep price; use as proof point or increase visibility.';
              }

              function riskFor(label) {
                if (['Margin Block', 'Manual Review'].includes(label)) return 'High';
                if (['Price Alert', 'Promo Attack', 'Banner Alignment Alert', 'Private Label Value Gap'].includes(label)) return 'Medium';
                return 'Low';
              }

              function runScan() {
                alerts = [];
                for (const product of products) {
                  for (const competitor of competitors) {
                    const h = hashText(product.sku + competitor.name);
                    if (h % 100 > 78) continue;
                    const promo = promoFromHash(h);
                    const variation = 0.86 + ((h % 33) / 100);
                    const competitorRegular = round2(Number(product.kruidvat_price_inc_vat) * variation);
                    const competitorEffective = round2(competitorRegular * promo.factor);
                    const ownUnit = unitPrice(Number(product.kruidvat_price_inc_vat), product);
                    const compUnit = unitPrice(competitorEffective, product);
                    let confidence = 96 - (h % 18);
                    if (competitor.type === 'Marketplace') confidence -= 18;
                    if (promo.kind === 'loyalty') confidence -= 8;
                    if (product.private_label_flag && competitor.name !== 'Trekpleister') confidence -= 10;
                    confidence = Math.max(58, Math.min(98, confidence));
                    const margin = marginStatus(product, competitorEffective);
                    const label = labelFor(product, competitor, confidence, promo, competitorEffective, ownUnit, compUnit, margin);
                    const risk = riskFor(label);
                    alerts.push({
                      product, competitor, promo, competitorRegular, competitorEffective, ownUnit, compUnit, confidence, margin, label, risk,
                      action: actionFor(label, product, competitor, promo),
                      url: 'https://example.com/' + encodeURIComponent(competitor.name.toLowerCase().replaceAll(' ', '-')) + '/' + product.sku.toLowerCase(),
                      timestamp: new Date().toISOString()
                    });
                  }
                }
                const order = { 'High': 0, 'Medium': 1, 'Low': 2 };
                alerts.sort((a, b) => order[a.risk] - order[b.risk] || b.confidence - a.confidence);
                selectedAlert = alerts[0] || null;
                render();
              }

              function filteredAlerts() {
                const group = document.getElementById('groupFilter').value;
                const label = document.getElementById('labelFilter').value;
                const comp = document.getElementById('competitorFilter').value;
                return alerts.filter(a => (group === 'All' || a.product.product_group === group) && (label === 'All' || a.label === label) && (comp === 'All' || a.competitor.name === comp));
              }

              function renderKpis(list) {
                const counts = {};
                for (const a of alerts) counts[a.label] = (counts[a.label] || 0) + 1;
                const high = alerts.filter(a => a.risk === 'High').length;
                document.getElementById('kpis').innerHTML = [
                  ['Products in scope', products.length, 'Sun Care 245, Baby Wipes 42, Oral Care 168'],
                  ['Competitors in scope', competitors.length, 'All competitors included, no stretch scope'],
                  ['Evidence matches', alerts.length, 'Generated competitor evidence rows'],
                  ['High risk alerts', high, 'Margin Block or Manual Review']
                ].map(k => '<div class="card"><div class="metric">' + k[1] + '</div><div><strong>' + k[0] + '</strong></div><div class="label">' + k[2] + '</div></div>').join('');
              }

              function renderTable() {
                const list = filteredAlerts().slice(0, 250);
                const body = document.getElementById('alertsBody');
                body.innerHTML = list.map((a, index) => {
                  const cls = a.risk === 'High' ? 'risk-high' : (a.risk === 'Medium' ? 'risk-med' : 'risk-low');
                  return '<tr data-index="' + alerts.indexOf(a) + '"><td><strong>' + a.product.product_name + '</strong><br><span class="small">' + a.product.product_group + ' | ' + a.product.sku + '</span></td><td>' + a.competitor.name + '<br><span class="small">' + a.competitor.role + '</span></td><td><span class="pill ' + cls + '">' + a.label + '</span></td><td>' + a.risk + '</td><td>' + a.confidence + '%</td><td>' + Math.round(a.margin.margin * 1000) / 10 + '%</td><td>' + a.action + '</td></tr>';
                }).join('');
                for (const row of body.querySelectorAll('tr')) {
                  row.addEventListener('click', () => { selectedAlert = alerts[Number(row.dataset.index)]; renderEvidence(); });
                }
              }

              function renderEvidence() {
                const box = document.getElementById('evidence');
                if (!selectedAlert) { box.textContent = 'No alert selected.'; return; }
                const a = selectedAlert;
                box.textContent = 'AI label: ' + a.label + '\n' +
                  'Product: ' + a.product.product_name + '\n' +
                  'Product group: ' + a.product.product_group + '\n' +
                  'Competitor: ' + a.competitor.name + '\n' +
                  'Source URL: ' + a.url + '\n' +
                  'Timestamp: ' + a.timestamp + '\n\n' +
                  'Kruidvat price: ' + euro.format(Number(a.product.kruidvat_price_inc_vat)) + '\n' +
                  'Competitor visible price: ' + euro.format(a.competitorRegular) + '\n' +
                  'Promotion text: ' + a.promo.text + '\n' +
                  'Effective competitor price: ' + euro.format(a.competitorEffective) + '\n' +
                  'Kruidvat normalized unit price: ' + euro.format(a.ownUnit) + '\n' +
                  'Competitor normalized unit price: ' + euro.format(a.compUnit) + '\n\n' +
                  'Synthetic cost ex VAT: ' + euro.format(Number(a.product.synthetic_cost_ex_vat)) + '\n' +
                  'Minimum margin: ' + Math.round(Number(a.product.min_margin_pct) * 1000) / 10 + '%\n' +
                  'Margin after response: ' + Math.round(a.margin.margin * 1000) / 10 + '%\n' +
                  'Price floor broken: ' + (a.margin.floorBroken ? 'yes' : 'no') + '\n' +
                  'Minimum margin broken: ' + (a.margin.minBroken ? 'yes' : 'no') + '\n\n' +
                  'Recommended action: ' + a.action + '\n' +
                  'Human check: verify source, stock, pack size, promo conditions and approval path before action.';
              }

              function renderBrief() {
                const counts = {};
                for (const a of alerts) counts[a.label] = (counts[a.label] || 0) + 1;
                const top = alerts.slice(0, 5).map(a => '- ' + a.label + ': ' + a.product.product_name + ' vs ' + a.competitor.name + ' — ' + a.action).join('\n');
                document.getElementById('brief').textContent = 'Daily Promo & Price Brief\n\n' +
                  'Scope: Sun Care, Baby Wipes and Oral Care. All 13 competitors included.\n' +
                  'Products in scope: ' + products.length + '. Evidence matches generated: ' + alerts.length + '.\n\n' +
                  'Alert counts: ' + Object.entries(counts).map(kv => kv[0] + ' ' + kv[1]).join(', ') + '.\n\n' +
                  'Top actions:\n' + top + '\n\n' +
                  'Control statement: no automatic price changes. All recommendations require human approval and source verification.';
              }

              function render() {
                renderKpis(filteredAlerts());
                renderTable();
                renderEvidence();
                renderBrief();
              }

              function exportCsv() {
                const rows = [['sku','product_group','product_name','competitor','ai_label','risk','confidence','kruidvat_price','competitor_effective_price','recommended_action']];
                for (const a of filteredAlerts()) rows.push([a.product.sku, a.product.product_group, a.product.product_name, a.competitor.name, a.label, a.risk, a.confidence, a.product.kruidvat_price_inc_vat, a.competitorEffective, a.action]);
                const csv = rows.map(row => row.map(value => '"' + String(value).replaceAll('"', '""') + '"').join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'kruidvat_ai_advisory_alerts.csv';
                a.click();
                URL.revokeObjectURL(url);
              }

              async function init() {
                products = await fetch('data/products.json').then(r => r.json());
                competitors = await fetch('data/competitors.json').then(r => r.json());
                const compSelect = document.getElementById('competitorFilter');
                for (const c of competitors) {
                  const option = document.createElement('option');
                  option.textContent = c.name;
                  compSelect.appendChild(option);
                }
                document.getElementById('runBtn').addEventListener('click', runScan);
                document.getElementById('exportBtn').addEventListener('click', exportCsv);
                for (const id of ['groupFilter','labelFilter','competitorFilter']) document.getElementById(id).addEventListener('change', render);
                document.getElementById('ragUpload').addEventListener('change', event => {
                  const files = Array.from(event.target.files).map(f => f.name + ' (' + Math.round(f.size / 1024) + ' KB)');
                  document.getElementById('loadedDocs').textContent = files.length ? files.join('\n') : 'No documents uploaded yet.';
                });
                runScan();
              }
              init();
            </script>
          </body>
          </html>'''
          (root / 'index.html').write_text(index_html, encoding='utf-8')
          (root / '404.html').write_text(index_html, encoding='utf-8')
          (root / '.nojekyll').write_text('', encoding='utf-8')
          print('Generated site files:')
          for path in sorted(root.rglob('*')):
              print(path)
          PY

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
