name: Deploy Kruidvat Price Advisor Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Generate and deploy dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate Kruidvat dashboard app and upload documents
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          python3 - <<'PY'

          from pathlib import Path
          import csv, json, random, math, zipfile, html, datetime
          from urllib.parse import quote_plus
          from xml.sax.saxutils import escape

          random.seed(84)
          root = Path('_site')
          (root / 'data').mkdir(parents=True, exist_ok=True)
          (root / 'workshop-documents').mkdir(parents=True, exist_ok=True)

          GENERATED_AT = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')

          competitors = [
              {'name':'Etos','type':'External drugstore','domain':'https://www.etos.nl'},
              {'name':'Albert Heijn','type':'Cross-channel supermarket','domain':'https://www.ah.nl'},
              {'name':'Trekpleister','type':'Internal AS Watson banner benchmark','domain':'https://www.trekpleister.nl'},
              {'name':'DA','type':'External drugstore','domain':'https://www.da.nl'},
              {'name':'De Online Drogist','type':'Online drugstore','domain':'https://www.deonlinedrogist.nl'},
              {'name':'Drogist.nl','type':'Online drugstore','domain':'https://www.drogist.nl'},
              {'name':'Plein.nl','type':'Online health and household','domain':'https://www.plein.nl'},
              {'name':'bol.com','type':'Marketplace','domain':'https://www.bol.com'},
              {'name':'Amazon.nl','type':'Marketplace','domain':'https://www.amazon.nl'},
              {'name':'Action','type':'Value retailer / functional benchmark','domain':'https://www.action.com'},
              {'name':'Die Grenze','type':'Discount / promo attack benchmark','domain':'https://www.diegrenze.nl'},
              {'name':'Jumbo','type':'Cross-channel supermarket','domain':'https://www.jumbo.com'},
              {'name':'PLUS','type':'Cross-channel supermarket','domain':'https://www.plus.nl'},
          ]

          AI_LABELS = ['Price Alert','Promo Attack','Margin Block','Banner Alignment Alert','Private Label Value Gap','Manual Review','Opportunity']
          PRODUCT_COUNTS = {'Sun Care':245, 'Baby Wipes':42, 'Oral Care':168}

          def money(v):
              return round(float(v) + 1e-9, 2)

          def retail_round(v):
              if v < 2:
                  return money(v)
              base = math.floor(v)
              cents = [0.49, 0.79, 0.89, 0.99]
              return money(base + random.choice(cents))

          def unit_price(price, group, size_value, total_units, oral_type=None):
              if group == 'Sun Care':
                  return money(price / size_value * 100.0)
              if group == 'Baby Wipes':
                  return round(price / total_units, 4)
              if group == 'Oral Care':
                  if oral_type == 'Brush heads':
                      return money(price / max(1, total_units))
                  if oral_type == 'Mouthwash':
                      return money(price / size_value * 100.0)
                  return money(price / size_value * 75.0)
              return money(price)

          def unit_label(group, oral_type=None):
              if group == 'Sun Care': return 'per 100 ml/g'
              if group == 'Baby Wipes': return 'per wipe'
              if group == 'Oral Care':
                  if oral_type == 'Brush heads': return 'per piece'
                  if oral_type == 'Mouthwash': return 'per 100 ml'
                  return 'per 75 ml'
              return 'per unit'

          sun_brands = ['NIVEA Sun','Garnier Ambre Solaire','Biodermal','Kruidvat Solait','Vision','Australian Gold','Lancaster','Naif']
          sun_forms = ['Spray','Lotion','Face Fluid','Kids Spray','Sensitive Lotion','After Sun','Oil Spray']
          sun_spf = ['SPF15','SPF30','SPF50','SPF50+']
          sun_sizes = [50,75,100,150,200,250]

          baby_brands = ['Kruidvat','Pampers','WaterWipes','Zwitsal','Naif','Huggies','Neutral']
          baby_types = ['Sensitive','Aqua Pure','Plastic Free','Lotion','Pure Water','Extra Soft','Perfume Free']
          baby_packs = [(1,40),(1,56),(4,52),(6,60),(9,60),(12,60),(12,65),(12,72),(24,52)]

          oral_brands = ['Sensodyne','Oral-B','Elmex','Colgate','Parodontax','Listerine','Aquafresh','Jordan','Kruidvat']
          oral_forms = ['Rapid Relief Toothpaste','Whitening Toothpaste','Sensitive Toothpaste','Gum Care Toothpaste','Mouthwash','Electric Brush Heads','Kids Toothpaste','Fresh Mint Toothpaste']
          oral_sizes = {'Toothpaste':[75,100,125], 'Mouthwash':[250,500,600], 'Brush heads':[2,4,6]}

          products = []

          def add_product(group, idx):
              if group == 'Sun Care':
                  brand = sun_brands[idx % len(sun_brands)]
                  form = sun_forms[(idx // len(sun_brands)) % len(sun_forms)]
                  spf = sun_spf[(idx // 5) % len(sun_spf)]
                  size = sun_sizes[(idx * 3) % len(sun_sizes)]
                  product_name = f'{brand} {spf} {form} {size}ml'
                  total_units = size
                  oral_type = ''
                  price = retail_round(random.uniform(5.5, 27.5) * (1.15 if brand not in ['Kruidvat Solait'] else 0.72))
                  category_key = 'SUN'
              elif group == 'Baby Wipes':
                  brand = baby_brands[idx % len(baby_brands)]
                  typ = baby_types[(idx // len(baby_brands)) % len(baby_types)]
                  packs, wipes = baby_packs[idx % len(baby_packs)]
                  size = wipes
                  total_units = packs * wipes
                  product_name = f'{brand} {typ} Baby Wipes {packs} x {wipes} wipes'
                  oral_type = ''
                  price = retail_round(random.uniform(1.59, 18.99) * (packs/3)**0.46)
                  category_key = 'WIPES'
              else:
                  brand = oral_brands[idx % len(oral_brands)]
                  form = oral_forms[(idx // len(oral_brands)) % len(oral_forms)]
                  if 'Mouthwash' in form:
                      oral_type = 'Mouthwash'
                      size = oral_sizes['Mouthwash'][idx % len(oral_sizes['Mouthwash'])]
                      total_units = size
                      product_name = f'{brand} {form} {size}ml'
                      price = retail_round(random.uniform(2.5, 8.8))
                  elif 'Brush Heads' in form:
                      oral_type = 'Brush heads'
                      size = oral_sizes['Brush heads'][idx % len(oral_sizes['Brush heads'])]
                      total_units = size
                      product_name = f'{brand} Electric Toothbrush Heads {size} pieces'
                      price = retail_round(random.uniform(9.5, 29.9))
                  else:
                      oral_type = 'Toothpaste'
                      size = oral_sizes['Toothpaste'][idx % len(oral_sizes['Toothpaste'])]
                      total_units = size
                      product_name = f'{brand} {form} {size}ml'
                      price = retail_round(random.uniform(1.79, 6.95) * (1.15 if brand == 'Sensodyne' else 1))
                  category_key = 'ORAL'
              private_label = brand in ['Kruidvat','Kruidvat Solait']
              vat = 1.21
              cost_ratio = random.uniform(0.34,0.53) if private_label else random.uniform(0.46,0.70)
              cost_ex_vat = money(price / vat * cost_ratio)
              min_margin = round(random.choice([0.18,0.22,0.25,0.28,0.32,0.35]), 2)
              funding = money(random.choice([0,0,0,0.25,0.50,0.75,1.00]) if not private_label else random.choice([0,0.15,0.25]))
              floor_inc = money((cost_ex_vat - funding) / max(0.08, (1-min_margin)) * vat)
              current_margin = round(((price/vat) - cost_ex_vat + funding) / max(0.01, price/vat), 4)
              current_promo = random.choice(['None','Kruidvat Club price','1+1 free this week','2nd half price','25% off','Online only']) if idx % 6 == 0 else 'None'
              kvi = idx % 10 in [0,3]
              promo_lock = idx % 31 == 0
              sku = f'KV-{category_key}-{idx+1:04d}'
              return {
                  'sku': sku,
                  'productGroup': group,
                  'brand': brand,
                  'productName': product_name,
                  'sizeValue': size,
                  'totalUnits': total_units,
                  'unitLabel': unit_label(group, oral_type),
                  'oralType': oral_type,
                  'kruidvatPrice': price,
                  'kruidvatUnitPrice': unit_price(price, group, size, total_units, oral_type),
                  'syntheticCostExVat': cost_ex_vat,
                  'minMarginPct': min_margin,
                  'priceFloorIncVat': floor_inc,
                  'currentMarginPct': current_margin,
                  'supplierFunding': funding,
                  'privateLabel': private_label,
                  'kvi': kvi,
                  'promoLock': promo_lock,
                  'currentKruidvatPromo': current_promo,
                  'productUrl': 'https://www.kruidvat.nl/search?q=' + quote_plus(product_name)
              }

          for group, count in PRODUCT_COUNTS.items():
              for idx in range(count):
                  products.append(add_product(group, idx))

          promo_options = [
              ('None', 1.0),
              ('1+1 free', 0.50),
              ('2nd half price', 0.75),
              ('25% off', 0.75),
              ('3 for 2', 0.667),
              ('Loyalty card price', 0.85),
              ('Temporary online deal', 0.80),
          ]

          for p_idx, p in enumerate(products):
              evidence = []
              scenario = p_idx % 19
              for c_idx, comp in enumerate(competitors):
                  name = comp['name']
                  available_chance = 0.93 if name in ['Etos','Albert Heijn','Trekpleister'] else 0.78
                  if name in ['Action','Die Grenze']: available_chance = 0.54
                  available = random.random() < available_chance
                  if not available:
                      evidence.append({
                          'competitor': name, 'available': False, 'sourceUrl': comp['domain'], 'regularPrice': None,
                          'effectivePrice': None, 'unitPrice': None, 'promoText': 'No reliable online match found',
                          'stock': 'Unknown', 'matchType':'No reliable match', 'confidence': 0, 'diffPctVsKruidvat': None
                      })
                      continue
                  factor = random.uniform(0.92,1.16)
                  if name == 'Etos': factor += random.uniform(-0.06,0.06)
                  if name == 'Albert Heijn': factor += random.uniform(-0.04,0.08)
                  if name == 'Trekpleister': factor += random.uniform(-0.08,0.05)
                  if name in ['De Online Drogist','Drogist.nl','Plein.nl']: factor += random.uniform(-0.12,0.02)
                  if name in ['bol.com','Amazon.nl']: factor += random.uniform(-0.14,0.10)
                  if name in ['Action','Die Grenze']: factor += random.uniform(-0.20,0.05)
                  if scenario == 3 and name in ['Etos','Albert Heijn']:
                      factor = random.uniform(0.96,1.04)
                      promo_text, promo_factor = ('1+1 free', 0.5)
                  elif scenario == 5 and name in ['De Online Drogist','Plein.nl']:
                      factor = random.uniform(0.84,0.93)
                      promo_text, promo_factor = ('Temporary online deal', 0.8)
                  elif scenario == 7 and name == 'Trekpleister':
                      factor = random.uniform(0.78,0.92)
                      promo_text, promo_factor = ('Banner price difference', 1.0)
                  elif scenario == 11 and name in ['bol.com','Amazon.nl']:
                      factor = random.uniform(0.70,0.88)
                      promo_text, promo_factor = ('Marketplace seller price', 1.0)
                  else:
                      promo_text, promo_factor = random.choice(promo_options if c_idx % 3 == 0 else promo_options[:4])
                  regular = retail_round(max(0.59, p['kruidvatPrice'] * factor))
                  effective = money(regular * promo_factor)
                  competitor_unit = unit_price(effective, p['productGroup'], p['sizeValue'], p['totalUnits'], p['oralType'])
                  kv_unit = p['kruidvatUnitPrice']
                  diff = round((competitor_unit - kv_unit) / max(0.0001, kv_unit) * 100.0, 1)
                  if name in ['Action','Die Grenze'] or (p['privateLabel'] and name not in ['Trekpleister']):
                      match_type = 'Functional benchmark'
                      confidence = random.randint(48,72)
                  elif name in ['bol.com','Amazon.nl']:
                      match_type = 'Marketplace likely match'
                      confidence = random.randint(60,84)
                  else:
                      match_type = 'Exact or high-confidence SKU match'
                      confidence = random.randint(82,97)
                  stock = random.choice(['Online in stock','Low stock','In stock','Unknown']) if name not in ['bol.com','Amazon.nl'] else random.choice(['Marketplace stock','Seller dependent','In stock'])
                  evidence.append({
                      'competitor': name,
                      'available': True,
                      'sourceUrl': comp['domain'] + '/search?q=' + quote_plus(p['productName']),
                      'regularPrice': regular,
                      'effectivePrice': effective,
                      'unitPrice': competitor_unit,
                      'promoText': promo_text,
                      'stock': stock,
                      'matchType': match_type,
                      'confidence': confidence,
                      'diffPctVsKruidvat': diff
                  })
              p['competitorEvidence'] = evidence
              usable = [e for e in evidence if e['available'] and e['unitPrice'] is not None and e['confidence'] >= 50]
              external = [e for e in usable if e['competitor'] != 'Trekpleister']
              if external:
                  market_avg = round(sum(e['unitPrice'] for e in external) / len(external), 4)
                  lowest = min(external, key=lambda e: e['unitPrice'])
              else:
                  market_avg = p['kruidvatUnitPrice']
                  lowest = {'competitor':'No reliable match','unitPrice':p['kruidvatUnitPrice'],'effectivePrice':p['kruidvatPrice'],'confidence':0,'promoText':'No match','matchType':'No match'}
              p['marketAvgUnitPrice'] = market_avg
              p['lowestCompetitor'] = lowest['competitor']
              p['lowestUnitPrice'] = lowest['unitPrice']
              p['lowestCompetitorEffectivePrice'] = lowest.get('effectivePrice')
              p['diffVsMarketPct'] = round((p['kruidvatUnitPrice'] - market_avg) / max(0.0001, market_avg) * 100.0, 1)
              p['diffVsLowestPct'] = round((p['kruidvatUnitPrice'] - lowest['unitPrice']) / max(0.0001, lowest['unitPrice']) * 100.0, 1)
              match_price_inc = lowest['effectivePrice'] if lowest.get('effectivePrice') else p['kruidvatPrice']
              match_margin = round(((match_price_inc/1.21) - p['syntheticCostExVat'] + p['supplierFunding']) / max(0.01, match_price_inc/1.21), 4)
              p['marginIfMatchedPct'] = match_margin
              p['matchWouldBreakFloor'] = bool(match_price_inc < p['priceFloorIncVat'] or match_margin < p['minMarginPct'])
              has_trek_lower = any(e['available'] and e['competitor']=='Trekpleister' and e['diffPctVsKruidvat'] is not None and e['diffPctVsKruidvat'] < -5 and e['confidence'] >= 75 for e in evidence)
              promo_attack = lowest.get('promoText','') in ['1+1 free','2nd half price','3 for 2','25% off','Temporary online deal','Loyalty card price'] and p['diffVsLowestPct'] > 5
              marketplace_lowest = lowest['competitor'] in ['bol.com','Amazon.nl']
              low_confidence = lowest.get('confidence',0) < 75
              private_value_gap = p['privateLabel'] and p['diffVsMarketPct'] > -10 and p['productGroup'] in ['Sun Care','Oral Care']
              # Force a balanced demo distribution of all AI advisory labels so the hosted tool
              # immediately shows the advisory layer, not just a tracker table.
              bucket = p_idx % 28
              if bucket in [0, 14]:
                  label = 'Manual Review'
                  action = 'Do not act automatically. Validate seller, pack size, stock and whether this is a comparable product before using the signal.'
              elif bucket in [1, 15]:
                  label = 'Price Alert'
                  action = 'Consider tactical response only if human approves and current promo lock allows it. Synthetic margin remains acceptable for a controlled response.'
                  p['matchWouldBreakFloor'] = False
                  if p['marginIfMatchedPct'] < p['minMarginPct'] + 0.03:
                      p['marginIfMatchedPct'] = round(p['minMarginPct'] + 0.05, 4)
              elif bucket in [2, 16]:
                  label = 'Promo Attack'
                  action = 'Avoid permanent price change. Compare effective unit price and consider temporary campaign, coupon or supplier-funded promo response.'
              elif bucket in [3, 17]:
                  label = 'Margin Block'
                  action = 'Do not match. Matching the lowest competitor would breach synthetic minimum margin or price floor. Consider supplier funding, coupon, bundle or approval path.'
                  p['matchWouldBreakFloor'] = True
              elif bucket in [4, 18]:
                  label = 'Banner Alignment Alert'
                  action = 'Review AS Watson banner positioning. Treat Trekpleister as internal benchmark, not as an external competitor response.'
              elif (p['privateLabel'] and bucket in [5, 19, 23]) or private_value_gap:
                  label = 'Private Label Value Gap'
                  action = 'Review own-label value positioning and product page communication. Do not treat A-brand products as exact SKU matches.'
              elif bucket in [6, 20]:
                  label = 'Opportunity'
                  action = 'Keep price. Use as price-perception proof point or increase visibility in campaign modules.'
              elif marketplace_lowest or low_confidence:
                  label = 'Manual Review'
                  action = 'Do not act automatically. Validate seller, pack size, stock and whether this is a comparable product before using the signal.'
              elif promo_attack:
                  label = 'Promo Attack'
                  action = 'Avoid permanent price change. Compare effective unit price and consider temporary campaign, coupon or supplier-funded promo response.'
              elif p['matchWouldBreakFloor'] and p['diffVsLowestPct'] > 4:
                  label = 'Margin Block'
                  action = 'Do not match. Matching the lowest competitor would breach synthetic minimum margin or price floor. Consider supplier funding, coupon, bundle or approval path.'
              elif has_trek_lower and p_idx % 3 == 1:
                  label = 'Banner Alignment Alert'
                  action = 'Review AS Watson banner positioning. Treat Trekpleister as internal benchmark, not as an external competitor response.'
              elif p['diffVsLowestPct'] > 5 and not p['matchWouldBreakFloor']:
                  label = 'Price Alert'
                  action = 'Consider tactical response only if human approves and current promo lock allows it. Synthetic margin remains acceptable for a controlled response.'
              else:
                  label = 'Opportunity'
                  action = 'No immediate price action required. Monitor and keep evidence for category review.'
              p['aiLabel'] = label
              p['recommendedAction'] = action
              p['risk'] = 'High' if label in ['Margin Block','Price Alert','Promo Attack'] and p['diffVsLowestPct'] > 8 else ('Medium' if label in ['Manual Review','Private Label Value Gap','Banner Alignment Alert'] else 'Low')
              p['sourceCount'] = len([e for e in evidence if e['available']])

          # Write JSON data
          (root / 'data' / 'products.json').write_text(json.dumps(products, ensure_ascii=False), encoding='utf-8')
          (root / 'data' / 'competitors.json').write_text(json.dumps(competitors, ensure_ascii=False), encoding='utf-8')

          # Summary CSV
          headers = ['sku','productGroup','brand','productName','kruidvatPrice','kruidvatUnitPrice','unitLabel','marketAvgUnitPrice','diffVsMarketPct','lowestCompetitor','lowestUnitPrice','diffVsLowestPct','currentMarginPct','marginIfMatchedPct','minMarginPct','priceFloorIncVat','aiLabel','risk','recommendedAction']
          with (root/'data'/'kruidvat_category_snapshot_pilot.csv').open('w', newline='', encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=headers)
              writer.writeheader()
              for p in products:
                  writer.writerow({k:p.get(k,'') for k in headers})

          # Competitor evidence CSV
          comp_headers = ['sku','productName','productGroup','competitor','available','regularPrice','effectivePrice','unitPrice','diffPctVsKruidvat','promoText','confidence','matchType','stock','sourceUrl']
          with (root/'data'/'competitor_price_evidence.csv').open('w', newline='', encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=comp_headers)
              writer.writeheader()
              for p in products:
                  for e in p['competitorEvidence']:
                      row = {k:e.get(k,'') for k in comp_headers}
                      row.update({'sku':p['sku'], 'productName':p['productName'], 'productGroup':p['productGroup']})
                      writer.writerow(row)

          # Minimal XLSX generator with one sheet

          def col_letter(n):
              s = ''
              while n:
                  n, r = divmod(n-1, 26)
                  s = chr(65+r) + s
              return s

          def make_xlsx(path, rows, sheet_name='Data'):
              def cell_xml(r, c, val):
                  ref = f'{col_letter(c)}{r}'
                  if val is None:
                      return f'<c r="{ref}"/>'
                  if isinstance(val, bool):
                      return f'<c r="{ref}" t="b"><v>{1 if val else 0}</v></c>'
                  if isinstance(val, (int,float)) and not isinstance(val, bool):
                      return f'<c r="{ref}"><v>{val}</v></c>'
                  return f'<c r="{ref}" t="inlineStr"><is><t>{escape(str(val))}</t></is></c>'
              sheet_rows = []
              for r_idx, row in enumerate(rows, 1):
                  cells = ''.join(cell_xml(r_idx, c_idx, val) for c_idx, val in enumerate(row, 1))
                  sheet_rows.append(f'<row r="{r_idx}">{cells}</row>')
              worksheet = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>' + ''.join(sheet_rows) + '</sheetData></worksheet>'
              workbook = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="' + escape(sheet_name) + '" sheetId="1" r:id="rId1"/></sheets></workbook>'
              rels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>'
              wb_rels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>'
              types = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>'
              with zipfile.ZipFile(path, 'w', zipfile.ZIP_DEFLATED) as z:
                  z.writestr('[Content_Types].xml', types)
                  z.writestr('_rels/.rels', rels)
                  z.writestr('xl/workbook.xml', workbook)
                  z.writestr('xl/_rels/workbook.xml.rels', wb_rels)
                  z.writestr('xl/worksheets/sheet1.xml', worksheet)

          xlsx_rows = [headers]
          for p in products:
              xlsx_rows.append([p.get(k,'') for k in headers])
          make_xlsx(root/'workshop-documents'/'ASW_Kruidvat_Price_Advisor_Data_Pack_EN.xlsx', xlsx_rows, 'Price Advisor Data')

          # Minimal DOCX generator

          def make_docx(path, title, paragraphs):
              body_parts = []
              body_parts.append('<w:p><w:r><w:rPr><w:b/><w:sz w:val="36"/></w:rPr><w:t>' + escape(title) + '</w:t></w:r></w:p>')
              for para in paragraphs:
                  if para.startswith('## '):
                      body_parts.append('<w:p><w:r><w:rPr><w:b/><w:sz w:val="28"/></w:rPr><w:t>' + escape(para[3:]) + '</w:t></w:r></w:p>')
                  elif para.startswith('- '):
                      body_parts.append('<w:p><w:r><w:t>• ' + escape(para[2:]) + '</w:t></w:r></w:p>')
                  else:
                      body_parts.append('<w:p><w:r><w:t>' + escape(para) + '</w:t></w:r></w:p>')
              document_xml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>' + ''.join(body_parts) + '<w:sectPr/></w:body></w:document>'
              rels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>'
              types = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>'
