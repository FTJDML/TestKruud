            <style>
              :root{--red:#e30613;--yellow:#ffd400;--ink:#1b1b1f;--muted:#68707a;--bg:#f4f5f7;--card:#fff;--line:#e4e7ec;--green:#0a8f52;--amber:#b56900;--danger:#bf1d28;--blue:#145cff;--shadow:0 14px 30px rgba(16,24,40,.10)}
              *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,Arial,Helvetica,sans-serif} a{color:inherit}.topbar{background:var(--red);color:white;border-bottom:10px solid var(--yellow);padding:22px 28px}.brand{display:flex;align-items:center;gap:18px}.logo{background:var(--yellow);color:var(--red);font-weight:950;font-size:32px;border-radius:12px;padding:10px 18px;letter-spacing:-1px}.topbar h1{margin:0;font-size:30px}.topbar p{margin:4px 0 0;opacity:.92}.wrap{max-width:1480px;margin:0 auto;padding:24px}.hero{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(320px,.7fr);gap:18px;align-items:stretch}.panel{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:22px}.hero h2{font-size:28px;margin:0 0 8px}.muted{color:var(--muted)}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 10px;font-weight:800;font-size:12px;background:#f2f4f7;border:1px solid var(--line)}.pill.red{background:#fff0f0;color:var(--danger);border-color:#ffd3d3}.pill.yellow{background:#fff7c2;color:#6b5400;border-color:#ffe86d}.pill.green{background:#e9f8ef;color:var(--green);border-color:#bde8cd}.btn{border:0;border-radius:14px;background:var(--red);color:#fff;font-weight:900;padding:13px 16px;cursor:pointer;box-shadow:0 8px 18px rgba(227,6,19,.22)}.btn.secondary{background:#111827;color:#fff}.btn.ghost{background:#fff;color:#111827;border:1px solid var(--line);box-shadow:none}.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.filters{display:grid;grid-template-columns:repeat(5,minmax(160px,1fr));gap:12px;margin-top:18px}.field label{display:block;font-size:12px;font-weight:900;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}.field select,.field input{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;padding:11px;color:#111827}.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-top:18px}.kpi{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 18px rgba(16,24,40,.06)}.kpi .value{font-size:28px;font-weight:950;letter-spacing:-.03em}.kpi .label{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;margin-top:4px}.dashboard{display:grid;grid-template-columns:minmax(0,1fr) 430px;gap:18px;margin-top:18px}.section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.section-title h3{margin:0;font-size:20px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}.table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;min-width:1180px}.table th{position:sticky;top:0;background:#111827;color:white;text-align:left;padding:11px;white-space:nowrap;font-size:12px}.table td{border-bottom:1px solid var(--line);padding:10px;vertical-align:middle}.table tr:hover{background:#fff9dc}.product-name{font-weight:850;max-width:330px}.money{font-variant-numeric:tabular-nums;font-weight:800}.delta{font-weight:950;border-radius:999px;padding:5px 8px;display:inline-block;min-width:74px;text-align:center}.delta.up{background:#ffe7e9;color:var(--danger)}.delta.down{background:#e9f8ef;color:var(--green)}.delta.flat{background:#eef2f6;color:#475467}.risk{border-radius:999px;padding:6px 9px;font-weight:900;font-size:12px}.risk.High{background:#ffe7e9;color:var(--danger)}.risk.Medium{background:#fff2d8;color:var(--amber)}.risk.Low{background:#e9f8ef;color:var(--green)}.label-chip{display:inline-block;font-weight:950;border-radius:10px;padding:6px 8px;font-size:12px;white-space:nowrap;background:#eef2ff;color:#263fb5}.PriceAlert{background:#ffe7e9;color:#bf1d28}.PromoAttack{background:#fff1c2;color:#7a5200}.MarginBlock{background:#ffe0e0;color:#9d111c}.BannerAlignmentAlert{background:#e7f0ff;color:#145cff}.PrivateLabelValueGap{background:#f1e7ff;color:#6d28d9}.ManualReview{background:#f0f0f0;color:#333}.Opportunity{background:#e3faed;color:#087443}.side-card{margin-bottom:18px}.evidence{max-height:520px;overflow:auto}.ev-row{border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;background:#fff}.ev-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.ev-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;color:#475467;font-size:12px}.bar{height:11px;background:#eef2f6;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--red);border-radius:999px}.brief{white-space:pre-wrap;background:#0b1220;color:#f8fafc;border-radius:16px;padding:16px;line-height:1.55;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;min-height:200px}.heatmap{display:grid;grid-template-columns:220px repeat(13,92px);overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff;font-size:12px}.heatmap div{padding:8px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);min-height:34px}.heatmap .h{background:#111827;color:#fff;font-weight:900;position:sticky;top:0;z-index:2}.heatmap .sticky{position:sticky;left:0;background:#fff;z-index:1;font-weight:800}.heatmap .h.sticky{background:#111827;z-index:3}.hm-cheap{background:#e9f8ef!important;color:#087443}.hm-exp{background:#ffe7e9!important;color:#bf1d28}.hm-mid{background:#fff7da!important;color:#8a5b00}.hm-na{background:#f2f4f7!important;color:#98a2b3}.group-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}.group-card{background:white;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 18px rgba(16,24,40,.06)}.small-table{width:100%;border-collapse:collapse;font-size:12px}.small-table th,.small-table td{border-bottom:1px solid var(--line);padding:8px;text-align:left}.drop{border:2px dashed #cfd4dc;border-radius:16px;padding:14px;background:#fafafa}.footer{padding:28px;text-align:center;color:#667085}.note{font-size:12px;color:#667085;line-height:1.45}.source-warning{border-left:6px solid var(--yellow);padding:12px;background:#fff9d9;border-radius:12px;margin-top:12px;color:#4d3b00}@media(max-width:1180px){.hero,.dashboard{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.filters{grid-template-columns:repeat(2,1fr)}.group-cards{grid-template-columns:1fr}}@media(max-width:700px){.kpis,.filters{grid-template-columns:1fr}.wrap{padding:12px}.topbar h1{font-size:22px}.logo{font-size:22px}}
            </style>
          </head>
          <body>
          <header class="topbar"><div class="brand"><div class="logo">Kruidvat</div><div><h1>Promo & Price Advisory AI Agent</h1><p>AS Watson workshop pilot • product-level price gaps, market averages, margin guardrails and AI action labels</p></div></div></header>
          <main class="wrap">
            <section class="hero">
              <div class="panel"><div class="section-title"><div><h2>Daily price intelligence dashboard</h2><p class="muted">This is the hosted workshop prototype. It uses a generated synthetic Kruidvat category snapshot plus competitor evidence to demonstrate the expected AI advisory behavior.</p></div><span class="pill yellow">Human approval required</span></div><div class="buttons"><a class="btn" href="workshop-documents/ASW_Kruidvat_Upload_Documents.zip">Download all upload documents</a><button class="btn secondary" id="scanBtn">Run AI advisory scan</button><button class="btn ghost" id="exportBtn">Export filtered alerts CSV</button></div><div class="source-warning"><b>Static GitHub Pages version:</b> prices and competitor evidence below are generated workshop data. Add a backend/API later for real live search. The UI and advisory logic are what participants should build toward.</div></div>
              <div class="panel"><h3 style="margin-top:0">Upload / RAG simulation</h3><div class="drop"><input type="file" id="ragFiles" multiple accept=".docx,.xlsx,.csv,.md,.txt,.yaml,.yml"/><p class="note" id="ragStatus">No RAG documents uploaded yet. Download the supplied documents and upload them here to simulate grounding.</p></div><div class="buttons"><a class="btn ghost" href="workshop-documents/ASW_Kruidvat_Price_Advisor_Data_Pack_EN.xlsx">Data Pack XLSX</a><a class="btn ghost" href="workshop-documents/02_RAG_Pricing_Margin_Policy_SYNTHETIC_EN.docx">Policy DOCX</a><a class="btn ghost" href="workshop-documents/03_RAG_Promotion_Matching_AI_Action_Rules_EN.docx">Rules DOCX</a></div><p class="note">Generated: <span id="generatedAt"></span>. Commercial layer is synthetic.</p></div>
            </section>
            <section class="panel" style="margin-top:18px"><div class="section-title"><h3>Filters</h3><span class="pill">455 products • 13 competitors • 3 product groups</span></div><div class="filters"><div class="field"><label>Product group</label><select id="groupFilter"><option>All</option><option>Sun Care</option><option>Baby Wipes</option><option>Oral Care</option></select></div><div class="field"><label>AI label</label><select id="labelFilter"><option>All</option></select></div><div class="field"><label>Competitor</label><select id="competitorFilter"><option>All</option></select></div><div class="field"><label>Risk</label><select id="riskFilter"><option>All</option><option>High</option><option>Medium</option><option>Low</option></select></div><div class="field"><label>Search product</label><input id="searchBox" placeholder="Search brand, SKU or product" /></div></div></section>
            <section class="kpis" id="kpis"></section>
            <section class="group-cards" id="groupCards"></section>
            <section class="dashboard"><div><div class="panel"><div class="section-title"><h3>Product-level price gaps and AI advice</h3><span class="pill red" id="rowCount">0 alerts</span></div><div class="table-wrap"><table class="table"><thead><tr><th>Product</th><th>Group</th><th>Kruidvat price</th><th>Kruidvat unit</th><th>Market avg unit</th><th>Vs market avg</th><th>Lowest competitor</th><th>Vs lowest</th><th>Current margin</th><th>Margin if matched</th><th>AI label</th><th>Risk</th><th>Recommended action</th></tr></thead><tbody id="alertBody"></tbody></table></div></div><div class="panel" style="margin-top:18px"><div class="section-title"><h3>Competitor price heatmap</h3><span class="pill">% versus Kruidvat unit price</span></div><div id="heatmap" class="heatmap"></div></div></div><aside><div class="panel side-card"><div class="section-title"><h3>Evidence drawer</h3><span class="pill" id="selectedSku">Select product</span></div><div id="evidenceBox" class="evidence"><p class="muted">Run the scan and select a product row.</p></div></div><div class="panel side-card"><h3 style="margin-top:0">AI label distribution</h3><div id="labelBars"></div></div><div class="panel"><h3 style="margin-top:0">Daily Price Brief</h3><div class="brief" id="brief">Run the scan to generate a copyable management brief.</div></div></aside></section>
          </main><footer class="footer">Kruidvat Promo & Price Advisory AI Agent • generated from one GitHub Actions YAML</footer>
          <script>
          var products=[]; var competitors=[]; var filtered=[]; var selected=null; var generatedAt='GENERATED_AT_PLACEHOLDER';
          function eur(v){ if(v===null||v===undefined||isNaN(v)) return '—'; return new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR'}).format(Number(v)); }
          function pct(v){ if(v===null||v===undefined||isNaN(v)) return '—'; var sign=Number(v)>0?'+':''; return sign+Number(v).toFixed(1)+'%'; }
          function clsLabel(label){return String(label).replace(/[^a-zA-Z]/g,'');}
          function deltaClass(v){ if(v===null||v===undefined) return 'flat'; if(v>5) return 'up'; if(v<-5) return 'down'; return 'flat'; }
          function marginClass(v,min){ if(v<min) return 'up'; if(v<min+.04) return 'flat'; return 'down'; }
          function loadFilters(){ var labels=[...new Set(products.map(function(p){return p.aiLabel;}))].sort(); var comps=competitors.map(function(c){return c.name;}); var lf=document.getElementById('labelFilter'); labels.forEach(function(l){var o=document.createElement('option');o.textContent=l;lf.appendChild(o);}); var cf=document.getElementById('competitorFilter'); comps.forEach(function(c){var o=document.createElement('option');o.textContent=c;cf.appendChild(o);}); ['groupFilter','labelFilter','competitorFilter','riskFilter','searchBox'].forEach(function(id){document.getElementById(id).addEventListener('input',render);}); }
          function applyFilters(){ var group=document.getElementById('groupFilter').value; var label=document.getElementById('labelFilter').value; var comp=document.getElementById('competitorFilter').value; var risk=document.getElementById('riskFilter').value; var q=document.getElementById('searchBox').value.toLowerCase(); filtered=products.filter(function(p){ var compOk=comp==='All'||p.lowestCompetitor===comp||p.competitorEvidence.some(function(e){return e.competitor===comp&&e.available;}); return (group==='All'||p.productGroup===group)&&(label==='All'||p.aiLabel===label)&&(risk==='All'||p.risk===risk)&&compOk&&(!q||(p.productName+' '+p.brand+' '+p.sku).toLowerCase().includes(q)); }); filtered.sort(function(a,b){ var r={High:0,Medium:1,Low:2}; return (r[a.risk]-r[b.risk]) || (b.diffVsLowestPct-a.diffVsLowestPct); }); }
          function renderKpis(){ var total=filtered.length; var avgGap=filtered.reduce(function(s,p){return s+p.diffVsMarketPct;},0)/Math.max(1,total); var above=filtered.filter(function(p){return p.diffVsMarketPct>5;}).length; var marginBlocks=filtered.filter(function(p){return p.aiLabel==='Margin Block';}).length; var promo=filtered.filter(function(p){return p.aiLabel==='Promo Attack';}).length; var manual=filtered.filter(function(p){return p.aiLabel==='Manual Review';}).length; var avgMargin=filtered.reduce(function(s,p){return s+p.currentMarginPct;},0)/Math.max(1,total)*100; var coverage=filtered.reduce(function(s,p){return s+p.sourceCount;},0)/Math.max(1,total)/competitors.length*100; var kpis=[['Products scanned',total],['Avg vs market',pct(avgGap)],['Products >5% above market',above],['Margin blocks',marginBlocks],['Promo attacks',promo],['Match coverage',coverage.toFixed(0)+'%']]; document.getElementById('kpis').innerHTML=kpis.map(function(k){return '<div class="kpi"><div class="value">'+k[1]+'</div><div class="label">'+k[0]+'</div></div>';}).join(''); }
          function renderGroupCards(){ var groups=['Sun Care','Baby Wipes','Oral Care']; document.getElementById('groupCards').innerHTML=groups.map(function(g){ var rows=products.filter(function(p){return p.productGroup===g;}); var avg=rows.reduce(function(s,p){return s+p.diffVsMarketPct;},0)/rows.length; var high=rows.filter(function(p){return p.risk==='High';}).length; var mb=rows.filter(function(p){return p.aiLabel==='Margin Block';}).length; return '<div class="group-card"><div class="section-title"><h3>'+g+'</h3><span class="pill">'+rows.length+' products</span></div><div class="kpi" style="box-shadow:none;padding:0;border:0"><div class="value">'+pct(avg)+'</div><div class="label">Avg vs market</div></div><p class="muted"><b>'+high+'</b> high-risk alerts • <b>'+mb+'</b> margin blocks</p></div>'; }).join(''); }
          function renderTable(){ var body=document.getElementById('alertBody'); document.getElementById('rowCount').textContent=filtered.length+' rows'; body.innerHTML=filtered.slice(0,180).map(function(p,idx){ return '<tr data-sku="'+p.sku+'"><td><div class="product-name">'+p.productName+'</div><div class="muted">'+p.sku+' • '+p.brand+'</div></td><td>'+p.productGroup+'</td><td class="money">'+eur(p.kruidvatPrice)+'</td><td class="money">'+eur(p.kruidvatUnitPrice)+' <span class="muted">'+p.unitLabel+'</span></td><td class="money">'+eur(p.marketAvgUnitPrice)+'</td><td><span class="delta '+deltaClass(p.diffVsMarketPct)+'">'+pct(p.diffVsMarketPct)+'</span></td><td><b>'+p.lowestCompetitor+'</b><br><span class="muted">'+eur(p.lowestUnitPrice)+' '+p.unitLabel+'</span></td><td><span class="delta '+deltaClass(p.diffVsLowestPct)+'">'+pct(p.diffVsLowestPct)+'</span></td><td><span class="delta '+marginClass(p.currentMarginPct,p.minMarginPct)+'">'+pct(p.currentMarginPct*100)+'</span></td><td><span class="delta '+marginClass(p.marginIfMatchedPct,p.minMarginPct)+'">'+pct(p.marginIfMatchedPct*100)+'</span></td><td><span class="label-chip '+clsLabel(p.aiLabel)+'">'+p.aiLabel+'</span></td><td><span class="risk '+p.risk+'">'+p.risk+'</span></td><td>'+p.recommendedAction+'</td></tr>'; }).join(''); Array.from(body.querySelectorAll('tr')).forEach(function(tr){tr.addEventListener('click',function(){ selected=products.find(function(p){return p.sku===tr.getAttribute('data-sku');}); renderEvidence(); });}); if(!selected&&filtered[0]){selected=filtered[0];renderEvidence();}}
          function renderEvidence(){ if(!selected)return; document.getElementById('selectedSku').textContent=selected.sku; var sorted=selected.competitorEvidence.slice().sort(function(a,b){ if(!a.available)return 1; if(!b.available)return -1; return (a.unitPrice||999)-(b.unitPrice||999);}); var top='<h4 style="margin:0 0 4px">'+selected.productName+'</h4><p class="muted">Kruidvat: <b>'+eur(selected.kruidvatPrice)+'</b> • unit: <b>'+eur(selected.kruidvatUnitPrice)+' '+selected.unitLabel+'</b> • Market avg: <b>'+eur(selected.marketAvgUnitPrice)+'</b> • Vs market: <b>'+pct(selected.diffVsMarketPct)+'</b></p><p><span class="label-chip '+clsLabel(selected.aiLabel)+'">'+selected.aiLabel+'</span> <span class="risk '+selected.risk+'">'+selected.risk+'</span></p><p><b>Advice:</b> '+selected.recommendedAction+'</p>'; var rows=sorted.map(function(e){ if(!e.available){return '<div class="ev-row"><div class="ev-head"><b>'+e.competitor+'</b><span class="pill">No match</span></div><p class="muted">'+e.promoText+'</p></div>'; } return '<div class="ev-row"><div class="ev-head"><b>'+e.competitor+'</b><span class="delta '+deltaClass(e.diffPctVsKruidvat)+'">'+pct(e.diffPctVsKruidvat)+'</span></div><div class="ev-grid"><div>Regular price<br><b>'+eur(e.regularPrice)+'</b></div><div>Effective price<br><b>'+eur(e.effectivePrice)+'</b></div><div>Unit price<br><b>'+eur(e.unitPrice)+' '+selected.unitLabel+'</b></div><div>Promo<br><b>'+e.promoText+'</b></div><div>Confidence<br><b>'+e.confidence+'%</b></div><div>Stock / match<br><b>'+e.stock+'</b><br>'+e.matchType+'</div></div><p class="note">Source: '+e.sourceUrl+'</p></div>'; }).join(''); document.getElementById('evidenceBox').innerHTML=top+rows; }
          function renderBars(){ var counts={}; products.forEach(function(p){counts[p.aiLabel]=(counts[p.aiLabel]||0)+1;}); var max=Math.max.apply(null,Object.values(counts)); document.getElementById('labelBars').innerHTML=Object.keys(counts).sort().map(function(k){return '<div style="margin:11px 0"><div style="display:flex;justify-content:space-between"><b>'+k+'</b><span>'+counts[k]+'</span></div><div class="bar"><span style="width:'+(counts[k]/max*100)+'%"></span></div></div>';}).join(''); }
          function renderHeatmap(){ var top=filtered.slice(0,16); var html='<div class="h sticky">Product</div>'+competitors.map(function(c){return '<div class="h">'+c.name+'</div>';}).join(''); top.forEach(function(p){html+='<div class="sticky">'+p.productName+'</div>'; competitors.forEach(function(c){ var e=p.competitorEvidence.find(function(x){return x.competitor===c.name;}); if(!e||!e.available){html+='<div class="hm-na">—</div>';return;} var cc=e.diffPctVsKruidvat<-5?'hm-cheap':(e.diffPctVsKruidvat>5?'hm-exp':'hm-mid'); html+='<div class="'+cc+'">'+pct(e.diffPctVsKruidvat)+'<br><span class="muted">'+eur(e.unitPrice)+'</span></div>';});}); document.getElementById('heatmap').innerHTML=html; }
          function renderBrief(){ var high=filtered.filter(function(p){return p.risk==='High';}); var price=filtered.filter(function(p){return p.aiLabel==='Price Alert';}); var margin=filtered.filter(function(p){return p.aiLabel==='Margin Block';}); var promo=filtered.filter(function(p){return p.aiLabel==='Promo Attack';}); var opp=filtered.filter(function(p){return p.aiLabel==='Opportunity';}); var above=filtered.filter(function(p){return p.diffVsMarketPct>5;}); var line='DAILY PRICE BRIEF\n\n'; line+='Scope: '+filtered.length+' filtered products across Sun Care, Baby Wipes and Oral Care. All 13 competitors are in scope.\n'; line+='Market position: '+above.length+' products are more than 5% above market average unit price.\n'; line+='High risk: '+high.length+' alerts require priority review.\n'; line+='Price Alerts: '+price.length+' | Promo Attacks: '+promo.length+' | Margin Blocks: '+margin.length+' | Opportunities: '+opp.length+'\n\n'; line+='Top actions:\n'; filtered.slice(0,6).forEach(function(p,i){line+=(i+1)+'. '+p.aiLabel+' - '+p.productName+' | Kruidvat '+eur(p.kruidvatPrice)+' | Market avg unit '+eur(p.marketAvgUnitPrice)+' | vs market '+pct(p.diffVsMarketPct)+' | lowest '+p.lowestCompetitor+' | action: '+p.recommendedAction+'\n';}); line+='\nSelf-check: verify live URLs, pack sizes, seller status and promotion terms before any human-approved price action. Never change prices automatically.'; document.getElementById('brief').textContent=line; }
          function render(){ applyFilters(); renderKpis(); renderGroupCards(); renderTable(); renderBars(); renderHeatmap(); renderBrief(); }
          function exportCsv(){ applyFilters(); var cols=['sku','productGroup','brand','productName','kruidvatPrice','kruidvatUnitPrice','marketAvgUnitPrice','diffVsMarketPct','lowestCompetitor','lowestUnitPrice','diffVsLowestPct','currentMarginPct','marginIfMatchedPct','aiLabel','risk','recommendedAction']; var rows=[cols.join(',')].concat(filtered.map(function(p){return cols.map(function(c){return '"'+String(p[c]===undefined?'':p[c]).replace(/"/g,'""')+'"';}).join(',');})); var blob=new Blob([rows.join('\n')],{type:'text/csv'}); var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download='kruidvat_filtered_price_alerts.csv'; a.click(); URL.revokeObjectURL(url); }
          document.getElementById('exportBtn').addEventListener('click',exportCsv); document.getElementById('scanBtn').addEventListener('click',function(){render(); this.textContent='Scan refreshed'; setTimeout(()=>this.textContent='Run AI advisory scan',1200);}); document.getElementById('ragFiles').addEventListener('change',function(e){var names=Array.from(e.target.files).map(function(f){return f.name;}); document.getElementById('ragStatus').innerHTML=names.length?'<b>Loaded RAG files:</b><br>'+names.join('<br>'):'No RAG documents uploaded yet.';});
          Promise.all([fetch('data/products.json').then(r=>r.json()),fetch('data/competitors.json').then(r=>r.json())]).then(function(data){products=data[0];competitors=data[1];document.getElementById('generatedAt').textContent=generatedAt;loadFilters();render();});
          </script>
          </body></html>'''
          html_page = html_page.replace('GENERATED_AT_PLACEHOLDER', GENERATED_AT)
          (root / 'index.html').write_text(html_page, encoding='utf-8')
          (root / '.nojekyll').write_text('', encoding='utf-8')

          PY

